<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontobuch – Gemeinschaftskonto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<script>
  // Theme so früh wie möglich setzen (vor dem ersten Rendern), damit beim Laden
  // nicht kurz das falsche Theme aufblitzt.
  (function(){
    try {
      var saved = localStorage.getItem('kontobuch-theme');
      var theme = saved || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e){ /* localStorage evtl. blockiert — dann bleibt es beim Standard (Light) */ }
  })();
</script>
<style>
  /* ======================================================================
     DESIGN TOKENS
     ====================================================================== */
  :root{
    --bg:#F5F7F4;
    --surface:#FFFFFF;
    --surface-alt:#F0F2ED;
    --border:#DFE3DB;
    --border-strong:#C7CCC1;
    --text:#1B231E;
    --text-muted:#66716A;
    --text-faint:#96A092;

    --income:#1F7A54;
    --income-bg:#E1F2E8;
    --expense:#B5432B;
    --expense-bg:#F9E4DE;
    --primary:#233E36;
    --primary-hover:#152D26;
    --amber:#B08900;
    --amber-bg:#F6EFD8;

    --radius-sm:6px;
    --radius-md:10px;
    --radius-lg:16px;
    --shadow-sm:0 1px 2px rgba(27,35,30,0.06);
    --shadow-md:0 6px 20px rgba(27,35,30,0.08);

    --toast-bg:#1B231E;
    --toast-text:#F2F5EF;

    --font-display:'Space Grotesk', 'Inter', sans-serif;
    --font-body:'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  }

  :root[data-theme="dark"]{
    --bg:#141712;
    --surface:#1C211C;
    --surface-alt:#242A23;
    --border:#333B31;
    --border-strong:#454E42;
    --text:#EBEFE8;
    --text-muted:#9BA596;
    --text-faint:#6C7669;

    --income:#4FB587;
    --income-bg:#1E3327;
    --expense:#E58367;
    --expense-bg:#3B2620;
    --primary:#3C7862;
    --primary-hover:#4A8672;
    --amber:#E2B457;
    --amber-bg:#3B2F16;

    --shadow-sm:0 1px 2px rgba(0,0,0,0.25);
    --shadow-md:0 6px 20px rgba(0,0,0,0.35);
  }

  *{box-sizing:border-box;}
  /* Sorgt dafür, dass [hidden] immer greift, auch wenn ein Element eigene
     display:flex/grid-Regeln hat (sonst gewinnt die eigene Regel gegen das
     unsichtbare UA-Default von [hidden] und das Element bleibt sichtbar). */
  [hidden]{display:none !important;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:var(--font-display); margin:0; letter-spacing:-0.01em;}
  button, input, select, textarea{font-family:inherit; font-size:inherit; color:inherit;}
  table{border-collapse:collapse; width:100%;}
  .num{font-variant-numeric:tabular-nums;}
  a{color:inherit;}

  /* ======================================================================
     LOGIN SCREEN
     ====================================================================== */
  .login-screen{
    min-height:100vh; display:flex; align-items:center; justify-content:center;
    padding:24px; background:
      radial-gradient(circle at 20% 20%, var(--surface-alt) 0%, transparent 55%),
      radial-gradient(circle at 85% 80%, var(--surface-alt) 0%, transparent 55%),
      var(--bg);
  }
  .login-card{
    position:relative;
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    box-shadow:var(--shadow-md); padding:40px 36px; width:100%; max-width:380px;
  }
  .login-theme-toggle{position:absolute; top:16px; right:16px;}
  .login-brand{display:flex; align-items:center; gap:12px; margin-bottom:4px;}
  .login-mark{
    width:40px; height:40px; border-radius:10px; background:var(--primary); color:#fff;
    display:flex; align-items:center; justify-content:center; font-family:var(--font-display);
    font-weight:700; font-size:19px;
  }
  .login-brand h1{font-size:22px; font-weight:700;}
  .login-sub{color:var(--text-muted); margin:2px 0 28px 0; font-size:14px;}
  #loginForm label{display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:14px;}
  #loginForm input{
    display:block; width:100%; margin-top:6px; padding:10px 12px; border:1px solid var(--border-strong);
    border-radius:var(--radius-sm); background:var(--bg); color:var(--text);
  }
  #loginForm input:focus{outline:2px solid var(--primary); outline-offset:1px; background:var(--surface);}
  .login-error{color:var(--expense); font-size:13px; margin:4px 0 0 0;}
  .login-info{color:var(--income); font-size:13px; margin:4px 0 0 0;}
  .login-forgot{text-align:center; margin:12px 0 0 0;}
  .login-forgot a{color:var(--text-muted); font-size:13px; text-decoration:underline;}
  .login-forgot a:hover{color:var(--text);}

  /* ======================================================================
     BUTTONS / FORM CONTROLS
     ====================================================================== */
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    padding:9px 16px; border-radius:var(--radius-sm); border:1px solid transparent;
    font-weight:600; font-size:14px; cursor:pointer; transition:background .15s, border-color .15s;
    white-space:nowrap;
  }
  .btn-primary{background:var(--primary); color:#fff;}
  .btn-primary:hover{background:var(--primary-hover);}
  .btn-secondary{background:var(--surface); border-color:var(--border-strong); color:var(--text);}
  .btn-secondary:hover{background:var(--surface-alt);}
  .btn-ghost{background:transparent; border-color:var(--border); color:var(--text-muted);}
  .btn-ghost:hover{background:var(--surface-alt); color:var(--text);}
  .btn-danger{background:transparent; color:var(--expense); border-color:var(--expense-bg);}
  .btn-danger:hover{background:var(--expense-bg);}
  .btn-sm{padding:5px 10px; font-size:12.5px;}
  .btn-block{width:100%;}
  .btn:disabled{opacity:.5; cursor:not-allowed;}
  .icon-btn{
    display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px;
    border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--surface);
    color:var(--text-muted); cursor:pointer; font-size:16px; padding:0; transition:background .15s, color .15s;
  }
  .icon-btn:hover{background:var(--surface-alt); color:var(--text);}

  select, .input{
    padding:8px 10px; border:1px solid var(--border-strong); border-radius:var(--radius-sm);
    background:var(--surface); color:var(--text);
  }
  select:focus, .input:focus{outline:2px solid var(--primary); outline-offset:1px;}
  label.field{display:flex; flex-direction:column; gap:5px; font-size:13px; font-weight:600; color:var(--text-muted);}

  /* ======================================================================
     APP SHELL
     ====================================================================== */
  .app-root{min-height:100vh; display:flex; flex-direction:column;}
  .app-header{
    display:flex; align-items:center; gap:24px; padding:12px 24px; background:var(--surface);
    border-bottom:1px solid var(--border); position:sticky; top:0; z-index:20; flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:10px; margin-right:8px;}
  .brand-mark{
    width:30px; height:30px; border-radius:8px; background:var(--primary); color:#fff;
    display:flex; align-items:center; justify-content:center; font-family:var(--font-display);
    font-weight:700; font-size:15px;
  }
  .brand-name{font-family:var(--font-display); font-weight:700; font-size:17px;}
  .tabs{display:flex; gap:4px; overflow-x:auto; flex:1;}
  .tab-btn{
    background:transparent; border:none; padding:8px 14px; border-radius:var(--radius-sm);
    font-weight:600; font-size:14px; color:var(--text-muted); cursor:pointer; white-space:nowrap;
  }
  .tab-btn:hover{background:var(--surface-alt); color:var(--text);}
  .tab-btn.active{background:var(--primary); color:#fff;}
  .header-user{display:flex; align-items:center; gap:10px; margin-left:auto;}
  .role-badge{font-size:12px; font-weight:700; padding:4px 10px; border-radius:999px;}
  .role-admin{background:var(--income-bg); color:var(--income);}
  .role-viewer{background:var(--amber-bg); color:var(--amber);}

  .view-container{padding:24px; max-width:1200px; width:100%; margin:0 auto; flex:1;}
  .view-header{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:18px; flex-wrap:wrap;}
  .view-header h2{font-size:21px;}
  .view-sub{color:var(--text-muted); font-size:13.5px;}

  .card{
    background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
    padding:20px; box-shadow:var(--shadow-sm);
  }
  .card + .card{margin-top:16px;}
  .card h3{font-size:15px; margin-bottom:14px;}

  /* ======================================================================
     GRIDS / RESPONSIVE
     ====================================================================== */
  .grid-2{display:grid; grid-template-columns:2fr 1fr; gap:16px;}
  .stat-cards{display:grid; grid-template-columns:repeat(3, 1fr); gap:14px; margin-bottom:16px;}
  .dashboard-controls{display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:14px; align-items:end;}
  @media (max-width:700px){
    .grid-2, .stat-cards, .dashboard-controls{grid-template-columns:1fr;}
    .app-header{padding:10px 14px; row-gap:8px;}
    .brand{order:1;}
    .header-user{order:2;}
    .tabs{order:3; flex-basis:100%; margin:0 -14px; padding:0 14px;}
    .view-container{padding:14px;}
    .view-header{flex-direction:column; align-items:flex-start; gap:4px;}
    .card{padding:16px;}
  }
  @media (max-width:420px){
    .header-user{gap:6px;}
    .header-user .btn-sm{padding:5px 8px; font-size:12px;}
    .icon-btn{width:30px; height:30px; font-size:14px;}
    .role-badge{padding:3px 7px; font-size:11px;}
    .stat-card .value{font-size:22px;}
    .login-card{padding:28px 22px;}
  }

  /* ======================================================================
     STAT CARDS / BADGES
     ====================================================================== */
  .stat-card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px 20px;}
  .stat-card .label{font-size:12.5px; font-weight:600; color:var(--text-muted); text-transform:uppercase; letter-spacing:.04em;}
  .stat-card .value{font-family:var(--font-display); font-size:26px; font-weight:700; margin-top:6px;}
  .stat-card.income .value{color:var(--income);}
  .stat-card.expense .value{color:var(--expense);}
  .stat-card .badge{margin-top:10px;}

  .badge{display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:999px; font-size:12px; font-weight:700;}
  .badge-over{background:var(--expense-bg); color:var(--expense);}
  .badge-under{background:var(--income-bg); color:var(--income);}
  .badge-neutral{background:var(--surface-alt); color:var(--text-muted);}

  .alert{
    display:flex; align-items:center; gap:10px; background:var(--amber-bg); color:var(--amber);
    border-radius:var(--radius-md); padding:12px 16px; font-size:13.5px; font-weight:600; margin-bottom:16px;
  }
  .alert a{text-decoration:underline; cursor:pointer;}

  /* ======================================================================
     CHARTS
     ====================================================================== */
  .chart-wrap{position:relative; height:300px; margin-top:6px;}
  .chart-checkbox-row{display:flex; flex-wrap:wrap; gap:6px 16px; margin-bottom:10px;}
  .chart-checkbox{display:flex; align-items:center; gap:5px; font-size:13px; color:var(--text-muted); cursor:pointer; user-select:none;}
  .chart-checkbox input{cursor:pointer;}
  .chart-note{font-size:12px; color:var(--text-faint); margin-top:8px;}

  .fixed-split{display:flex; align-items:center; gap:16px; flex-wrap:wrap;}
  .fixed-split-item{flex:0 0 auto;}
  .fixed-split-item .label{font-size:12px; color:var(--text-muted); font-weight:600;}
  .fixed-split-item .value{font-size:19px; font-weight:700; font-family:var(--font-display); margin-top:2px;}
  .fixed-split-bar{flex:1 1 140px; min-width:100px; height:10px; border-radius:999px; background:var(--income-bg); overflow:hidden;}
  .fixed-split-bar-fixed{height:100%; background:var(--income); border-radius:999px 0 0 999px;}
  @media (max-width:700px){
    .fixed-split{flex-direction:column; align-items:stretch;}
    .fixed-split-bar{order:3; width:100%;}
  }

  /* ======================================================================
     TABLES / LISTS
     ====================================================================== */
  .table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch;}
  .data-table{font-size:13.5px;}
  .data-table th{
    text-align:left; padding:8px 10px; border-bottom:1px solid var(--border);
    color:var(--text-muted); font-size:12px; text-transform:uppercase; letter-spacing:.03em; font-weight:700;
  }
  .data-table td{padding:9px 10px; border-bottom:1px solid var(--border);}
  .data-table tr:last-child td{border-bottom:none;}
  .cat-dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px;}
  .amount{font-weight:700;}
  .amount.pos{color:var(--income);}
  .amount.neg{color:var(--expense);}

  .txn-list{display:flex; flex-direction:column; gap:8px;}
  .txn-row{
    display:grid;
    grid-template-columns:28px 90px 1fr 110px 210px;
    grid-template-areas:"check date desc amount actions";
    gap:12px; align-items:center;
    padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface);
    min-width:0;
  }
  .txn-row > *{min-width:0;}
  .txn-row.compact{
    grid-template-columns:90px 1fr 110px 150px;
    grid-template-areas:"date desc amount actions";
  }
  .txn-row.txn-row-categorize{grid-template-columns:28px 90px 1fr 110px 260px;}
  .txn-row [data-role="select"]{grid-area:check;}
  .txn-row .date{grid-area:date; color:var(--text-muted); font-size:13px;}
  .txn-row .txn-desc{grid-area:desc; min-width:0;}
  .txn-row .desc{font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .txn-row .amount{grid-area:amount;}
  .txn-row .txn-actions{grid-area:actions; display:flex; align-items:center; gap:8px;}
  @media (max-width:700px){
    .txn-row, .txn-row.compact, .txn-row.txn-row-categorize{
      grid-template-columns:auto 1fr auto;
      grid-template-areas:
        "check date amount"
        "desc desc desc"
        "actions actions actions";
      row-gap:6px; column-gap:8px;
    }
    .txn-row.compact{
      grid-template-columns:1fr auto;
      grid-template-areas:
        "date amount"
        "desc desc"
        "actions actions";
    }
    .txn-row .amount{justify-self:end;}
    .txn-row .txn-actions{justify-content:space-between; flex-wrap:wrap; border-top:1px solid var(--border); padding-top:8px; margin-top:2px;}
  }

  .raw-details{margin-top:6px; grid-column:1/-1; min-width:0;}
  .raw-details summary{cursor:pointer; color:var(--text-faint); font-size:12px; font-weight:600; user-select:none;}
  .raw-details summary:hover{color:var(--text-muted);}
  .raw-list{display:grid; grid-template-columns:max-content minmax(0,1fr); gap:3px 14px; margin:8px 0 0 0; font-size:12.5px;}
  .raw-list dt{color:var(--text-muted); font-weight:600; min-width:0;}
  .raw-list dd{margin:0; color:var(--text); min-width:0; overflow-wrap:anywhere;}

  .top-expense-row{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap;
    padding:10px 12px; border:1px solid var(--border); border-radius:var(--radius-md); background:var(--surface);
  }
  .top-expense-row .date{color:var(--text-muted); font-size:13px; flex:0 0 auto;}
  .top-expense-row .desc{font-weight:600; flex:1 1 160px; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .top-expense-row .amount{flex:0 0 auto; margin-left:auto;}
  @media (max-width:700px){
    .top-expense-row .desc{flex-basis:100%; order:1; white-space:normal;}
    .top-expense-row .date{order:2;}
    .top-expense-row .amount{order:3; margin-left:auto;}
  }

  .row-actions{display:flex; align-items:center; gap:6px;}
  .checkbox-cell{width:28px;}

  .status-flag{font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px;}
  .status-ok{background:var(--income-bg); color:var(--income);}
  .status-duplicate{background:var(--surface-alt); color:var(--text-muted);}
  .status-correction{background:var(--amber-bg); color:var(--amber);}
  .status-pending{background:var(--amber-bg); color:var(--amber);}

  .empty-state{text-align:center; padding:40px 20px; color:var(--text-muted);}
  .empty-state .big{font-size:34px; margin-bottom:8px;}

  /* ======================================================================
     IMPORT VIEW
     ====================================================================== */
  .dropzone{
    border:2px dashed var(--border-strong); border-radius:var(--radius-lg); padding:32px;
    text-align:center; color:var(--text-muted); cursor:pointer; transition:border-color .15s, background .15s;
  }
  .dropzone.drag{border-color:var(--primary); background:var(--surface-alt);}
  .dropzone .big{font-size:28px; margin-bottom:6px;}
  .import-paste{margin-top:14px;}
  .import-paste textarea{
    width:100%; min-height:90px; border:1px solid var(--border-strong); border-radius:var(--radius-sm);
    padding:10px; resize:vertical; font-family:ui-monospace, monospace; font-size:12.5px;
  }
  .mapping-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-top:12px;}
  .import-summary{display:flex; gap:16px; align-items:center; flex-wrap:wrap; margin:14px 0; font-size:13.5px;}
  .import-summary strong{font-family:var(--font-display);}
  .rule-inline{display:flex; align-items:center; gap:6px; margin-top:4px; font-size:12px; color:var(--text-muted);}
  .rule-inline input[type="text"]{padding:4px 7px; font-size:12px; border:1px solid var(--border-strong); border-radius:5px; width:120px;}

  /* ======================================================================
     TOASTS
     ====================================================================== */
  .toast-container{position:fixed; bottom:20px; right:20px; z-index:100; display:flex; flex-direction:column; gap:8px;}
  .toast{
    background:var(--toast-bg); color:var(--toast-text); padding:12px 16px; border-radius:var(--radius-sm); font-size:13.5px;
    font-weight:600; box-shadow:var(--shadow-md); opacity:0; transform:translateY(8px); transition:opacity .25s, transform .25s;
    border-left:4px solid var(--text-faint); max-width:320px;
  }
  .toast.show{opacity:1; transform:translateY(0);}
  .toast-success{border-left-color:var(--income);}
  .toast-error{border-left-color:var(--expense);}
  .toast-info{border-left-color:var(--amber);}

  .loading-state{padding:60px 20px; text-align:center; color:var(--text-muted);}
</style>
</head>
<body>

  <div id="toastContainer" class="toast-container"></div>

  <!-- ========================================================================
       LOGIN SCREEN
       ======================================================================== -->
  <div id="loginScreen" class="login-screen">
    <div class="login-card">
      <button id="themeToggleBtnLogin" class="icon-btn login-theme-toggle" title="Darstellung umschalten">🌙</button>
      <div class="login-brand">
        <span class="login-mark">K</span>
        <h1>Kontobuch</h1>
      </div>
      <p class="login-sub">Gemeinschaftskonto-Übersicht</p>
      <form id="loginForm" novalidate>
        <label>E-Mail
          <input type="email" id="loginEmail" required autocomplete="username">
        </label>
        <label>Passwort
          <input type="password" id="loginPassword" required autocomplete="current-password">
        </label>
        <button type="submit" class="btn btn-primary btn-block">Anmelden</button>
        <p class="login-forgot"><a href="#" id="forgotPasswordLink">Passwort vergessen?</a></p>
        <p id="loginError" class="login-error" hidden></p>
        <p id="loginInfo" class="login-info" hidden></p>
      </form>
    </div>
  </div>

  <!-- ========================================================================
       APP SHELL
       ======================================================================== -->
  <div id="appRoot" class="app-root" hidden>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">K</span>
        <span class="brand-name">Kontobuch</span>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab-btn" data-tab="dashboard">Übersicht</button>
        <button class="tab-btn" data-tab="import" data-admin-only>Import</button>
        <button class="tab-btn" data-tab="categorize" data-admin-only>Kategorisieren</button>
        <button class="tab-btn" data-tab="all">Alle Buchungen</button>
        <button class="tab-btn" data-tab="rules" data-admin-only>Regeln</button>
      </nav>
      <div class="header-user">
        <button id="undoBtn" class="icon-btn" title="Nichts rückgängig zu machen" data-admin-only disabled>↺</button>
        <button id="refreshBtn" class="icon-btn" title="Aktualisieren">⟳</button>
        <button id="themeToggleBtn" class="icon-btn" title="Darstellung umschalten">🌙</button>
        <span id="userRoleBadge" class="role-badge"></span>
        <button id="logoutBtn" class="btn btn-ghost btn-sm">Abmelden</button>
      </div>
    </header>
    <main id="viewContainer" class="view-container">
      <div class="loading-state">Daten werden geladen …</div>
    </main>
  </div>

<script type="module">

/* ========================================================================
   KONFIGURATION
   ======================================================================== */
const firebaseConfig = {

function esc(str){
  return String(str ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function chunkArray(arr, size){
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

function exportTransactionsCsv(transactions, filename){
  if (!transactions.length){ showToast('Keine Buchungen zum Exportieren.', 'error'); return; }
  const escCsv = (s) => `"${String(s ?? '').replace(/"/g, '""')}"`;
  const header = ['Datum', 'Beschreibung', 'Betrag (EUR)', 'Kategorie'];
  const lines = [header.join(';')];
  const sorted = [...transactions].sort((a, b) => a.date.localeCompare(b.date));
  for (const t of sorted){
    const amountStr = t.amount.toFixed(2).replace('.', ',');
    lines.push([escCsv(formatDateDisplay(t.date)), escCsv(t.description), amountStr, escCsv(t.category)].join(';'));
  }
  const csvContent = '\uFEFF' + lines.join('\r\n');
  const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast(`${transactions.length} Buchung(en) exportiert.`, 'success');
}

function monthKeysBetween(from, to){
  const keys = [];
  let [y, m] = from.split('-').map(Number);
  const [ey, em] = to.split('-').map(Number);
  let guard = 0;
  while ((y < ey || (y === ey && m <= em)) && guard < 600){
    keys.push(`${y}-${String(m).padStart(2, '0')}`);
    m++; if (m > 12){ m = 1; y++; }
    guard++;
  }
  return keys;
}

  const [y, m] = mk.split('-').map(Number);
  const d = new Date(y, m - 1, 1);
  return d.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
}

function wireLazyRawDetails(rowEl, raw, excludeKeys){
  const details = rowEl.querySelector('.raw-details');

  details.addEventListener('toggle', () => {
    if (!details.open || details.dataset.loaded) return;
    const exclude = new Set(excludeKeys || []);
    const entries = Object.entries(raw || {}).filter(([k, v]) => !exclude.has(k) && v !== '' && v != null);
    details.querySelector('.raw-list').innerHTML = entries.map(([k, v]) => `<dt>${esc(k)}</dt><dd>${esc(v)}</dd>`).join('');
    details.dataset.loaded = '1';
  });
}

/* ========================================================================
   CSV-PARSER (DKB-Umsatzexport & ähnliche Formate)
   ======================================================================== */
function parseCsvLine(line, delimiter){
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++){
    const ch = line[i];
    if (inQuotes){
      if (ch === '"'){
        if (line[i + 1] === '"'){ cur += '"'; i++; }
        else { inQuotes = false; }
      } else {
        cur += ch;
      }
    } else {
      if (ch === '"'){ inQuotes = true; }
      else if (ch === delimiter){ result.push(cur); cur = ''; }
      else { cur += ch; }
    }
  }
  result.push(cur);
  return result.map(s => s.trim());
}

function detectDelimiter(lines){
  let semi = 0, comma = 0;
  for (const line of lines.slice(0, 30)){
    semi += (line.match(/;/g) || []).length;
    comma += (line.match(/,/g) || []).length;
  }
  return semi >= comma ? ';' : ',';
}

function findHeaderRowIndex(lines, delimiter){
  for (let i = 0; i < Math.min(lines.length, 25); i++){
    const cells = parseCsvLine(lines[i], delimiter).map(c => c.toLowerCase());
    const joined = cells.join(' ');
    if (joined.includes('betrag') && (joined.includes('datum') || joined.includes('buchungstag'))) return i;
  }
  return 0;
}

function autoMapColumns(headerCells){
  const lower = headerCells.map(h => h.toLowerCase());
  const findIdx = (pred) => {
    const i = lower.findIndex(pred);
    return i === -1 ? null : i;
  };
  return {
    date: findIdx(h => h.includes('buchungsdatum')) ?? findIdx(h => h.includes('buchungstag')) ?? findIdx(h => h.includes('datum')),
    amount: findIdx(h => h.includes('betrag')),
    recipient: findIdx(h => h.includes('zahlungsempfänger') || h.includes('zahlungsempfaenger') || h.includes('begünstig') || h.includes('beguenstig') || h.includes('auftraggeber')),
    payer: findIdx(h => h.includes('zahlungspflichtige')),
    purpose: findIdx(h => h.includes('verwendungszweck')),
    status: findIdx(h => h.includes('status')),
    category: findIdx(h => h.includes('kategorie')),
  };
}

function parseBankCsv(text){
  const rawLines = text.split(/\r\n|\r|\n/).filter(l => l.trim().length > 0);
  if (!rawLines.length) throw new Error('Datei enthält keine Daten.');
  const delimiter = detectDelimiter(rawLines);
  const headerIdx = findHeaderRowIndex(rawLines, delimiter);
  const headerCells = parseCsvLine(rawLines[headerIdx], delimiter);
  const colMap = autoMapColumns(headerCells);
  const dataLines = rawLines.slice(headerIdx + 1);
  const rows = [];
  for (const line of dataLines){
    const cells = parseCsvLine(line, delimiter);
    if (cells.length < 2) continue;
    const raw = {};
    headerCells.forEach((h, i) => { raw[h || `Spalte ${i + 1}`] = cells[i] ?? ''; });
    rows.push({ raw, cells, lineText: line });
  }
  return { headerCells, colMap, rows, delimiter, headerIdx };
}

const GERMAN_MONTHS_3 = {
  jan:1, feb:2, 'mär':3, mrz:3, apr:4, mai:5, jun:6, jul:7, aug:8, sep:9, okt:10, nov:11, dez:12,
};

function parseGermanDate(str){
  if (!str) return null;
  const s = str.trim();
  // Format A: TT.MM.JJ(JJ) — Standard-DKB-Export, z.B. "20.07.26"
  let m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2,4})$/);
  if (m){
    let [, d, mo, y] = m;
    if (y.length === 2) y = (parseInt(y, 10) <= 79 ? '20' : '19') + y;
    return `${y}-${mo.padStart(2, '0')}-${d.padStart(2, '0')}`;
  }
  // Format B: "Wochentag, TT. Monatsname JJJJ" — z.B. aus Apple-Numbers-Exporten,
  // "Mo., 27. Mai 2024" oder "Mi., 01. März 2023"
  m = s.match(/^[A-Za-zÄÖÜäöü]+\.?,?\s*(\d{1,2})\.\s*([A-Za-zÄÖÜäöü]+)\.?\s*(\d{4})$/);
  if (m){
    const [, d, monName, y] = m;
    const key = monName.toLowerCase().replace(/\.$/, '').slice(0, 3);
    const mn = GERMAN_MONTHS_3[key];
    if (mn) return `${y}-${String(mn).padStart(2, '0')}-${d.padStart(2, '0')}`;
  }
  return null;
}

function parseGermanAmount(str){
  if (str == null || str === '') return NaN;
  let s = String(str).trim().replace(/[^\d,.-]/g, '');
  s = s.replace(/\./g, '').replace(',', '.');
  return parseFloat(s);
}

function buildDescription(recipient, payer, purpose){
  const name = (recipient || payer || '').trim();
  const parts = [];
  if (name) parts.push(name);
  if (purpose && purpose.trim() && purpose.trim() !== name) parts.push(purpose.trim());
  const joined = parts.join(' — ').trim();
  return joined || '(ohne Beschreibung)';
}

function buildCandidate(row, colMap, headerCells){
  const cells = row.cells;
  const at = (idx) => (idx != null && idx >= 0 && idx < cells.length) ? cells[idx] : '';
  const dateRaw = at(colMap.date);
  const amountRaw = at(colMap.amount);
  const status = at(colMap.status);
  const recipient = at(colMap.recipient);
  const payer = at(colMap.payer);
  const purpose = at(colMap.purpose);
  const sourceCategory = at(colMap.category).trim();
  const isoDate = parseGermanDate(dateRaw);
  const amount = parseGermanAmount(amountRaw);
  const description = buildDescription(recipient, payer, purpose);
  const usedKeys = [colMap.date, colMap.amount, colMap.recipient, colMap.payer, colMap.purpose, colMap.category]
    .filter(i => i != null && i >= 0)
    .map(i => headerCells[i] || `Spalte ${i + 1}`);
  return { isoDate, amount, description, status, sourceCategory, raw: row.raw, usedKeys };
}

async function computeHash(isoDate, amount, lineText){
  const data = new TextEncoder().encode(`${isoDate}|${amount}|${lineText}`);
  const digest = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(digest)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function matchCategory(description){
  const lower = description.toLowerCase();
  for (const rule of store.rules){
    if (rule.keyword && lower.includes(rule.keyword)) return rule.category;
  }
  return DEFAULT_CATEGORY;
}

async function upsertRule(keyword, category){
  const existing = store.rules.find(r => r.keyword === keyword);
  if (existing){
    if (existing.category !== category){
      await updateDoc(doc(db, RULES_COLLECTION, existing.id), { category });
    }
  } else {
    await addDoc(collection(db, RULES_COLLECTION), { keyword, category, createdAt: serverTimestamp() });
  }
}

/* ------------------------------------------------------------------------
   UNDO (letzte Aktionen rückgängig machen)
   ------------------------------------------------------------------------ */
function pushUndo(entry){
  state.undoStack.push(entry);
  if (state.undoStack.length > 10) state.undoStack.shift();
  updateUndoButton();
}

function updateUndoButton(){
  const btn = document.getElementById('undoBtn');
  if (!btn) return;
  const last = state.undoStack[state.undoStack.length - 1];
  btn.disabled = !last;
  btn.title = last ? `Rückgängig: ${last.label}` : 'Nichts rückgängig zu machen';
}

async function undoLastAction(){
  const entry = state.undoStack.pop();
  updateUndoButton();
  if (!entry) return;
  try {
    if (entry.type === 'category'){
      for (const chunk of chunkArray(entry.restore, 400)){
        const batch = writeBatch(db);
        chunk.forEach(r => batch.update(doc(db, TRANSACTIONS_COLLECTION, r.id), { category: r.category }));
        await batch.commit();
      }
    } else if (entry.type === 'delete'){
      for (const chunk of chunkArray(entry.restore, 400)){
        const batch = writeBatch(db);
        chunk.forEach(t => {
          const { id, ...data } = t;
          batch.set(doc(db, TRANSACTIONS_COLLECTION, id), data);
        });
        await batch.commit();
      }
    }
    showToast(`Rückgängig gemacht: ${entry.label}`, 'success');
  } catch (err){
    console.error(err);
    showToast('Rückgängig machen fehlgeschlagen: ' + err.message, 'error');
    state.undoStack.push(entry); // Eintrag zurücklegen, da es nicht geklappt hat
    updateUndoButton();
  }
}

async function setTransactionCategory(id, category){
  const prev = store.transactions.find(t => t.id === id);
  try {
    await updateDoc(doc(db, TRANSACTIONS_COLLECTION, id), { category });
    if (prev && prev.category !== category){
      pushUndo({ type: 'category', label: '1 Kategorie-Änderung', restore: [{ id, category: prev.category }] });
    }
  } catch (err){
    showToast('Fehler beim Aktualisieren: ' + err.message, 'error');
  }
}

async function deleteTransactionById(id){
  if (!confirm('Diese Buchung wirklich löschen?')) return;
  const prev = store.transactions.find(t => t.id === id);
  try {
    await deleteDoc(doc(db, TRANSACTIONS_COLLECTION, id));
    if (prev) pushUndo({ type: 'delete', label: '1 gelöschte Buchung', restore: [prev] });
    showToast('Buchung gelöscht.', 'success');
  } catch (err){
    showToast('Fehler beim Löschen: ' + err.message, 'error');
  }
}

async function bulkAssignCategory(ids, category){
  if (!ids.length){ showToast('Keine Buchungen ausgewählt.', 'error'); return; }
  const previousStates = ids
    .map(id => store.transactions.find(t => t.id === id))
    .filter(Boolean)
    .map(t => ({ id: t.id, category: t.category }))
    .filter(r => r.category !== category);
  try {
    for (const chunk of chunkArray(ids, 400)){
      const batch = writeBatch(db);
      chunk.forEach(id => batch.update(doc(db, TRANSACTIONS_COLLECTION, id), { category }));
      await batch.commit();
    }
    if (previousStates.length){
      pushUndo({ type: 'category', label: `Kategorisierung von ${previousStates.length} Buchung(en)`, restore: previousStates });
    }
    showToast(`${ids.length} Buchung(en) als „${category}“ kategorisiert.`, 'success');
  } catch (err){
    showToast('Fehler bei der Sammelkategorisierung: ' + err.message, 'error');
  }
}

async function bulkDeleteTransactions(ids){
  if (!ids.length){ showToast('Keine Buchungen ausgewählt.', 'error'); return; }
  const confirmMsg = ids.length === 1
    ? 'Diese Buchung wirklich löschen?'
    : `${ids.length} Buchungen wirklich unwiderruflich löschen?`;
  if (!confirm(confirmMsg)) return;
  const deletedDocs = ids.map(id => store.transactions.find(t => t.id === id)).filter(Boolean);
  try {
    for (const chunk of chunkArray(ids, 400)){
      const batch = writeBatch(db);
      chunk.forEach(id => batch.delete(doc(db, TRANSACTIONS_COLLECTION, id)));
      await batch.commit();
    }
    if (deletedDocs.length){
      pushUndo({ type: 'delete', label: `Löschen von ${deletedDocs.length} Buchung(en)`, restore: deletedDocs });
    }
    showToast(`${ids.length} Buchung(en) gelöscht.`, 'success');
  } catch (err){
    showToast('Fehler beim Löschen: ' + err.message, 'error');
  }
}

async function commitImport(){
  const rowsToImport = state.importState.previewRows.filter(r => r.include);
  if (!rowsToImport.length){
    showToast('Keine Buchungen zum Importieren ausgewählt.', 'error');
    return;
  }
  try {
    for (const r of rowsToImport){
      if (r.saveRule && r.ruleKeyword.trim()){
        await upsertRule(r.ruleKeyword.trim().toLowerCase(), r.category);
      }
    }
    const newRows = rowsToImport.filter(r => r.statusFlag === 'ok');
    const correctionRows = rowsToImport.filter(r => r.statusFlag === 'correction');

    let imported = 0;
    for (const chunk of chunkArray(newRows, 400)){
      const batch = writeBatch(db);
      for (const r of chunk){
        const ref = doc(collection(db, TRANSACTIONS_COLLECTION));
        batch.set(ref, {
          date: r.candidate.isoDate,
          description: r.candidate.description,
          amount: r.candidate.amount,
          category: r.category,
          status: 'Gebucht',
          hash: r.hash,
          raw: r.candidate.raw,
          usedKeys: r.candidate.usedKeys || [],
          createdAt: serverTimestamp(),
          importedAt: serverTimestamp(),
        });
        imported++;
      }
      await batch.commit();
    }

    let corrected = 0;
    for (const chunk of chunkArray(correctionRows, 400)){
      const batch = writeBatch(db);
      for (const r of chunk){
        batch.update(doc(db, TRANSACTIONS_COLLECTION, r.existingId), { category: r.category });
        corrected++;
      }
      await batch.commit();
    }

    const dupCount = state.importState.previewRows.filter(r => r.statusFlag === 'duplicate').length;
    const pendingCount = state.importState.previewRows.filter(r => r.statusFlag === 'vorgemerkt').length;
    showToast(`${imported} importiert, ${corrected} Kategorien korrigiert, ${dupCount} Duplikate übersprungen, ${pendingCount} vorgemerkt übersprungen.`, 'success');
    state.importState = emptyImportState();
    renderCurrentView();
  } catch (err){
    console.error(err);
    showToast('Import fehlgeschlagen: ' + err.message, 'error');
  }
}

/* ========================================================================
   FIRESTORE: LIVE-SYNCHRONISATION
   ======================================================================== */
function subscribeStore(){
  const txQuery = query(collection(db, TRANSACTIONS_COLLECTION), orderBy('date', 'desc'));
  onSnapshot(txQuery, snap => {
    store.transactions = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    store.transactionsLoaded = true;
    maybeInitialRender();
    onStoreChanged();
  }, err => showToast('Fehler beim Laden der Buchungen: ' + err.message, 'error'));

  const rulesQuery = query(collection(db, RULES_COLLECTION));
  onSnapshot(rulesQuery, snap => {
    store.rules = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    store.rulesLoaded = true;
    maybeInitialRender();
    onStoreChanged();
  }, err => showToast('Fehler beim Laden der Regeln: ' + err.message, 'error'));
}

function maybeInitialRender(){
  if (store.transactionsLoaded && store.rulesLoaded && !state.initialRenderDone){
    state.initialRenderDone = true;
    renderCurrentView();
    migrateLegacyCategories();
  }
}

async function migrateLegacyCategories(){
  if (state.role !== 'admin') return; // Betrachterin darf ohnehin nicht schreiben
  const aliasKeys = Object.keys(CATEGORY_ALIASES);
  const txToFix = store.transactions.filter(t => aliasKeys.includes(t.category));
  const rulesToFix = store.rules.filter(r => aliasKeys.includes(r.category));
  if (!txToFix.length && !rulesToFix.length) return;
  try {
    for (const chunk of chunkArray(txToFix, 400)){
      const batch = writeBatch(db);
      chunk.forEach(t => batch.update(doc(db, TRANSACTIONS_COLLECTION, t.id), { category: CATEGORY_ALIASES[t.category] }));
      await batch.commit();
    }
    for (const r of rulesToFix){
      await updateDoc(doc(db, RULES_COLLECTION, r.id), { category: CATEGORY_ALIASES[r.category] });
    }
    if (txToFix.length || rulesToFix.length){
      showToast(`Kategorie-Umbenennung: ${txToFix.length} Buchung(en) und ${rulesToFix.length} Regel(n) aktualisiert.`, 'success');
    }
  } catch (err){
    console.error(err);
    showToast('Fehler bei der Kategorie-Migration: ' + err.message, 'error');
  }
}

function onStoreChanged(){
  if (!state.initialRenderDone) return;
  renderCurrentView();
}

/* ========================================================================
   DASHBOARD: BERECHNUNGEN
   ======================================================================== */
function computeStats(transactions){
  let income = 0, expense = 0, total = 0;
  const byCategory = {};
  for (const t of transactions){
    total += t.amount;
    if (t.category === INCOME_CATEGORY){
      income += t.amount;
      byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
    } else {
      expense += -t.amount;
      byCategory[t.category] = (byCategory[t.category] || 0) + (-t.amount);
    }
  }
  return { income, expense, saldo: total, byCategory };
}

function computeMonthlyAverages(transactions, comparisonMonthKeys){
  const monthly = {};
  for (const t of transactions){
    const mk = t.date.slice(0, 7);
    if (!comparisonMonthKeys.includes(mk)) continue;
    if (!monthly[mk]) monthly[mk] = {};
    const val = t.category === INCOME_CATEGORY ? t.amount : -t.amount;
    monthly[mk][t.category] = (monthly[mk][t.category] || 0) + val;
  }
  const n = comparisonMonthKeys.length || 1;
  const avgByCategory = {};
  for (const cat of CATEGORIES){
    let sum = 0;
    for (const mk of comparisonMonthKeys) sum += (monthly[mk]?.[cat] || 0);
    avgByCategory[cat] = sum / n;
  }
  let totalSum = 0;
  for (const mk of comparisonMonthKeys){
    const catsObj = monthly[mk] || {};
    totalSum += Object.entries(catsObj).reduce((s, [cat, v]) => s + (cat === INCOME_CATEGORY ? 0 : v), 0);
  }
  return { avgByCategory, avgExpenseTotal: totalSum / n };
}

function computeOverallCategoryAverage(transactions, allMonthKeys, category){
  if (!allMonthKeys.length) return 0;
  let sum = 0;
  for (const mk of allMonthKeys){
    const val = transactions
      .filter(t => t.date.slice(0, 7) === mk && t.category === category)
      .reduce((s, t) => s + (category === INCOME_CATEGORY ? t.amount : -t.amount), 0);
    sum += val;
  }
  return sum / allMonthKeys.length;
}

function computeBadge(periodValue, avgValue, monthsCount){
  if (!avgValue){
    return { label: periodValue ? 'kein Vergleich' : '–', cls: 'badge-neutral' };
  }
  const periodEquivalent = periodValue / (monthsCount || 1);
  const pct = ((periodEquivalent - avgValue) / avgValue) * 100;
  if (pct > 5) return { label: `+${pct.toFixed(0)}% über Ø`, cls: 'badge-over' };
  if (pct < -5) return { label: `${pct.toFixed(0)}% unter Ø`, cls: 'badge-under' };
  return { label: '≈ Ø', cls: 'badge-neutral' };
}

function computeDashboardData(){
  const { mode, month, from, to, category } = state.dashboard;
  const rangeFrom = mode === 'month' ? `${month}-01` : from;
  const rangeTo = mode === 'month' ? lastDayOfMonth(month) : to;
  const periodAll = store.transactions.filter(t => t.date >= rangeFrom && t.date <= rangeTo);
  const periodMonthKeys = mode === 'month' ? [month] : monthKeysBetween(from, to);
  const allMonthKeys = getAllMonthKeys(store.transactions);
  const comparisonMonthKeys = allMonthKeys.filter(m => !periodMonthKeys.includes(m));

  const stats = computeStats(periodAll);
  const { avgByCategory, avgExpenseTotal } = computeMonthlyAverages(store.transactions, comparisonMonthKeys);
  const periodMonthsCount = periodMonthKeys.length || 1;

  const unclassifiedCount = periodAll.filter(t => t.category === DEFAULT_CATEGORY).length;

  const recurring = detectRecurringTransactions(store.transactions);
  const recurringIds = new Set();
  recurring.forEach(r => r.ids.forEach(id => recurringIds.add(id)));
  const fixedTotal = periodAll
    .filter(t => t.category !== INCOME_CATEGORY && recurringIds.has(t.id))
    .reduce((s, t) => s + (-t.amount), 0);
  const variableTotal = Math.max(0, stats.expense - fixedTotal);

  const topExpenses = computeTopExpenses(periodAll, 10);

  let yoy = null;
  if (mode === 'month'){
    const lastYearKey = shiftMonthKey(month, -12);
    const lastYearTx = store.transactions.filter(t => t.date.slice(0, 7) === lastYearKey);
    if (lastYearTx.length){
      yoy = { monthKey: lastYearKey, stats: computeStats(lastYearTx) };
    }
  }

  return {
    periodAll, periodMonthKeys, allMonthKeys, comparisonMonthKeys,
    stats, avgByCategory, avgExpenseTotal, periodMonthsCount,
    unclassifiedCount, rangeFrom, rangeTo, category,
    recurring, fixedTotal, variableTotal, topExpenses, yoy,
  };
}

function detectRecurringTransactions(transactions){
  const groups = {};
  for (const t of transactions){
    if (t.category === INCOME_CATEGORY) continue;
    const key = (t.description.split(' — ')[0] || t.description).trim().toLowerCase();
    if (!key) continue;
    (groups[key] = groups[key] || []).push(t);
  }
  const recurring = [];
  for (const txs of Object.values(groups)){
    const months = new Set(txs.map(t => t.date.slice(0, 7)));
    if (months.size < 3) continue; // mind. 3 verschiedene Monate, um "wiederkehrend" zu sein
    const amounts = txs.map(t => Math.abs(t.amount));
    const mean = amounts.reduce((a, b) => a + b, 0) / amounts.length;
    if (mean === 0) continue;
    const variance = amounts.reduce((a, b) => a + (b - mean) ** 2, 0) / amounts.length;
    const cv = Math.sqrt(variance) / mean; // Variationskoeffizient: wie stark schwankt der Betrag?
    if (cv > 0.15) continue; // zu unregelmäßig im Betrag, um als Fixkosten zu gelten
    recurring.push({
      displayName: txs[0].description.split(' — ')[0] || txs[0].description,
      category: txs[txs.length - 1].category,
      count: txs.length,
      monthsCount: months.size,
      avgAmount: mean,
      ids: new Set(txs.map(t => t.id)),
    });
  }
  return recurring.sort((a, b) => b.avgAmount - a.avgAmount);
}

function computeTopExpenses(transactions, n){
  return transactions
    .filter(t => t.category !== INCOME_CATEGORY && t.amount < 0)
    .sort((a, b) => a.amount - b.amount)
    .slice(0, n);
}

function shiftMonthKey(monthKey, deltaMonths){
  let [y, m] = monthKey.split('-').map(Number);
  m += deltaMonths;
  while (m < 1){ m += 12; y--; }
  while (m > 12){ m -= 12; y++; }
  return `${y}-${String(m).padStart(2, '0')}`;
}

  });

  const toInput = document.getElementById('dashTo');
  if (fromInput) fromInput.addEventListener('change', e => {
    state.dashboard.from = e.target.value;

  if (toInput) toInput.addEventListener('change', e => {
    state.dashboard.to = e.target.value;

  });

    cb.addEventListener('change', e => {

      else state.dashboard.chartCategories.delete(e.target.value);
      renderDashboard(container);
    });
  });

  if (gotoBtn) gotoBtn.addEventListener('click', () => switchTab('categorize'));

  // --- Charts ----------------------------------------------------------
  const pal = chartPalette();
  const barCanvas = document.getElementById('barChart');
  if (barChartInstance) barChartInstance.destroy();
  barChartInstance = new Chart(barCanvas.getContext('2d'), {
    type: 'bar',
    data: {
      labels: tableRows.map(r => r.cat),
      datasets: [
        { label: 'Zeitraum', data: tableRows.map(r => r.periodValue), backgroundColor: pal.expense, borderRadius: 4, maxBarThickness: 42 },
        { label: 'Ø pro Monat', data: tableRows.map(r => r.avgValue), backgroundColor: pal.neutralBar, borderRadius: 4, maxBarThickness: 42 },
      ],
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, color: pal.tick, font: { family: 'Inter' } } } },
      scales: {
        x: { grid: { display: false }, ticks: { color: pal.tick, font: { family: 'Inter', size: 11 } } },
        y: { grid: { color: pal.grid }, ticks: { color: pal.tick, font: { family: 'Inter', size: 11 }, callback: v => v + ' €' } },
      },
    },
  });

  const lineCanvas = document.getElementById('lineChart');
  if (lineChartInstance) lineChartInstance.destroy();
  const lineLabels = d.allMonthKeys;
  const zeroLineDataset = {
    label: 'Null-Linie', data: lineLabels.map(() => 0),
    borderColor: pal.refLine, borderWidth: 1, borderDash: [2, 3], pointRadius: 0, order: 99,
  };
  let lineDatasets;

  if (state.dashboard.chartCategories.size > 0){
    // Mehrfachvergleich: eine Linie pro angehakter Kategorie, ohne Ø-Referenzlinie
    // (die skaliert bei mehreren gleichzeitigen Linien nicht sinnvoll).
    lineDatasets = [...state.dashboard.chartCategories].map(cat => ({
      label: cat,
      data: d.allMonthKeys.map(mk => {
        return store.transactions
          .filter(t => t.date.slice(0, 7) === mk && t.category === cat)
          .reduce((s, t) => s + (cat === INCOME_CATEGORY ? t.amount : -t.amount), 0);
      }),
      borderColor: categoryColor(cat),
      backgroundColor: 'transparent', tension: 0.3, pointRadius: 3, borderWidth: 2,
    }));
    lineDatasets.push(zeroLineDataset);
  } else if (category === 'all'){
    // Saldo-Verlauf: Segmente und Punkte farblich nach Vorzeichen einfärben, damit auf
    // einen Blick klar ist, ob ein Monat über oder unter der Null-Linie liegt.
    const lineData = d.allMonthKeys.map(mk => {
      return store.transactions.filter(t => t.date.slice(0, 7) === mk).reduce((s, t) => s + t.amount, 0);
    });
    lineDatasets = [{
      label: 'Saldo', data: lineData,
      backgroundColor: 'transparent', tension: 0.3, borderWidth: 2,
      pointRadius: 3,
      pointBackgroundColor: lineData.map(v => v >= 0 ? pal.income : pal.expense),
      pointBorderColor: lineData.map(v => v >= 0 ? pal.income : pal.expense),
      segment: {
        borderColor: ctx => {
          const y0 = ctx.p0.parsed.y, y1 = ctx.p1.parsed.y;
          if (y0 >= 0 && y1 >= 0) return pal.income;
          if (y0 < 0 && y1 < 0) return pal.expense;
          return pal.refLine; // Segment kreuzt die Null-Linie
        },
      },
    }, zeroLineDataset];
  } else {
    const lineData = d.allMonthKeys.map(mk => {
      return store.transactions
        .filter(t => t.date.slice(0, 7) === mk && t.category === category)
        .reduce((s, t) => s + (category === INCOME_CATEGORY ? t.amount : -t.amount), 0);
    });
    const refValue = computeOverallCategoryAverage(store.transactions, d.allMonthKeys, category);
    const mainLabel = category === INCOME_CATEGORY ? 'Einnahmen' : 'Ausgaben';
    lineDatasets = [{
      label: mainLabel, data: lineData, borderColor: category === INCOME_CATEGORY ? pal.income : pal.expense,
      backgroundColor: 'transparent', tension: 0.3, pointRadius: 3, borderWidth: 2,
    }];
    if (refValue != null){
      lineDatasets.push({
        label: 'Ø gesamt', data: lineLabels.map(() => refValue),
        borderColor: pal.refLine, borderDash: [6, 4], pointRadius: 0, borderWidth: 1.5,
      });
    }
    lineDatasets.push(zeroLineDataset);
  }

  lineChartInstance = new Chart(lineCanvas.getContext('2d'), {
    type: 'line',
    data: { labels: lineLabels.map(monthLabelShort), datasets: lineDatasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: {
          position: 'bottom',
          labels: { usePointStyle: true, color: pal.tick, font: { family: 'Inter' }, filter: item => item.text !== 'Null-Linie' },
        },
      },
      scales: {
        x: { grid: { display: false }, ticks: { color: pal.tick, font: { family: 'Inter', size: 11 } } },
        y: { grid: { color: pal.grid }, ticks: { color: pal.tick, font: { family: 'Inter', size: 11 }, callback: v => v + ' €' } },
      },
    },
  });
}

/* ========================================================================
   IMPORT: RENDERING & LOGIK
   ======================================================================== */
async function processImportFile(text, fileName){
  const cleanText = text.replace(/^\uFEFF/, '');
  let parseResult;
  try {
    parseResult = parseBankCsv(cleanText);
  } catch (err){
    showToast('CSV konnte nicht gelesen werden: ' + err.message, 'error');
    return;
  }
  state.importState.parseResult = parseResult;
  state.importState.manualMapping = null;
  state.importState.fileName = fileName || '';
  await buildPreview();
}

async function buildPreview(){
  const { rows, headerCells } = state.importState.parseResult;
  const colMap = state.importState.manualMapping || state.importState.parseResult.colMap;
  const existingByHash = new Map(store.transactions.map(t => [t.hash, t]));
  const seenInFile = new Set();
  const previewRows = [];
  for (const row of rows){
    const candidate = buildCandidate(row, colMap, headerCells);
    if (!candidate.isoDate || isNaN(candidate.amount)) continue;
    const isPending = candidate.status && candidate.status.toLowerCase().includes('vorgemerkt');
    const hash = await computeHash(candidate.isoDate, candidate.amount, row.lineText);
    const trustedSourceCategory = (candidate.sourceCategory && CATEGORIES.includes(normalizeCategory(candidate.sourceCategory)))
      ? normalizeCategory(candidate.sourceCategory) : null;
    const existingTx = existingByHash.get(hash);
    let statusFlag = 'ok';
    let existingId = null;
    let existingCategory = null;
    if (isPending){
      statusFlag = 'vorgemerkt';
    } else if (existingTx || seenInFile.has(hash)){
      if (existingTx && trustedSourceCategory && existingTx.category !== trustedSourceCategory){
        // Datensatz existiert schon, aber die gespeicherte Kategorie weicht von der
        // Datei ab (z.B. durch eine versehentliche Sammelkategorisierung) — Korrektur anbieten.
        statusFlag = 'correction';
        existingId = existingTx.id;
        existingCategory = existingTx.category;
      } else {
        statusFlag = 'duplicate';
      }
    }
    seenInFile.add(hash);
    const category = trustedSourceCategory || matchCategory(candidate.description);
    const nameGuess = (candidate.description.split(' — ')[0] || '').toLowerCase();
    previewRows.push({
      candidate, hash, statusFlag, category,
      include: statusFlag === 'ok' || statusFlag === 'correction',
      saveRule: false,
      ruleKeyword: nameGuess,
      existingId, existingCategory,
    });
  }
  state.importState.previewRows = previewRows;
  state.importState.dirty = previewRows.length > 0;
  renderImport(document.getElementById('viewContainer'));
}

function importSummaryText(){
  const rows = state.importState.previewRows;
  const toImport = rows.filter(r => r.include && r.statusFlag === 'ok').length;
  const toCorrect = rows.filter(r => r.include && r.statusFlag === 'correction').length;
  const dup = rows.filter(r => r.statusFlag === 'duplicate').length;
  const pending = rows.filter(r => r.statusFlag === 'vorgemerkt').length;
  return `<strong>${toImport}</strong> neu · <strong>${toCorrect}</strong> Korrekturen · <strong>${dup}</strong> Duplikate · <strong>${pending}</strong> vorgemerkt`;
}

function renderImport(container){
  const st = state.importState;
  const hasPreview = st.previewRows.length > 0;
  const colMap = st.manualMapping || st.parseResult?.colMap || {};
  const headerCells = st.parseResult?.headerCells || [];

  const mappingSelect = (fieldKey, label) => `
    <label class="field">${label}
      <select data-map-field="${fieldKey}">
        <option value="">– keine –</option>
        ${headerCells.map((h, i) => `<option value="${i}" ${colMap[fieldKey] === i ? 'selected' : ''}>${esc(h)}</option>`).join('')}
      </select>
    </label>`;

  container.innerHTML = `
    <div class="view-header">
      <div>
        <h2>Import</h2>
        <p class="view-sub">CSV-Export der Bank hochladen oder einfügen — Kopfzeile &amp; Spalten werden automatisch erkannt.</p>
      </div>
    </div>

    <div class="card">
      <div id="dropzone" class="dropzone">
        <div class="big">📄</div>
        <div><strong>CSV-Datei hierher ziehen</strong> oder klicken zum Auswählen</div>
        <input type="file" id="fileInput" accept=".csv,text/csv" hidden>
      </div>
      <div class="import-paste">
        <label class="field">Oder CSV-Inhalt einfügen
          <textarea id="pasteArea" placeholder="Buchungsdatum;Wertstellung;Status;..."></textarea>
        </label>
      </div>

      ${st.parseResult ? `
        <details style="margin-top:16px;">
          <summary style="cursor:pointer; font-weight:600; font-size:13.5px; color:var(--text-muted);">Erweitert: Spalten manuell zuordnen</summary>
          <div class="mapping-grid">
            ${mappingSelect('date', 'Datum')}
            ${mappingSelect('amount', 'Betrag')}
            ${mappingSelect('recipient', 'Zahlungsempfänger*in')}
            ${mappingSelect('payer', 'Zahlungspflichtige*r')}
            ${mappingSelect('purpose', 'Verwendungszweck')}
            ${mappingSelect('status', 'Status')}
            ${mappingSelect('category', 'Kategorie (falls vorhanden)')}
          </div>
        </details>
      ` : ''}
    </div>

    ${hasPreview ? `
      <div class="card">
        <h3>Vorschau (${st.previewRows.length} Zeilen)</h3>
        <div class="import-summary" id="importSummary">${importSummaryText()}</div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th></th><th>Datum</th><th>Beschreibung</th><th>Betrag</th><th>Kategorie</th><th>Status</th>
              </tr>
            </thead>
            <tbody id="previewBody">
              ${st.previewRows.map((r, i) => renderPreviewRow(r, i)).join('')}
            </tbody>
          </table>
        </div>
        <div style="display:flex; gap:10px; margin-top:16px;">
          <button id="commitImportBtn" class="btn btn-primary">Importieren</button>
          <button id="discardImportBtn" class="btn btn-ghost">Vorschau verwerfen</button>
        </div>
      </div>
    ` : ''}
  `;

  // --- Dropzone / Datei-Auswahl ----------------------------------------
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  dropzone.addEventListener('click', () => fileInput.click());
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault(); dropzone.classList.remove('drag');
    const file = e.dataTransfer.files?.[0];
    if (file) readFile(file);
  });
  fileInput.addEventListener('change', e => {
    const file = e.target.files?.[0];
    if (file) readFile(file);
  });
  function readFile(file){
    const reader = new FileReader();
    reader.onload = () => processImportFile(String(reader.result), file.name);
    reader.readAsText(file, 'UTF-8');
  }

  const pasteArea = document.getElementById('pasteArea');
  let pasteTimer = null;
  pasteArea.addEventListener('input', e => {
    clearTimeout(pasteTimer);
    const val = e.target.value;
    pasteTimer = setTimeout(() => {
      if (val.trim().length > 10) processImportFile(val, '(eingefügt)');
    }, 500);
  });

  // --- Manuelle Spaltenzuordnung ----------------------------------------
  container.querySelectorAll('[data-map-field]').forEach(sel => {
    sel.addEventListener('change', () => {
      const current = state.importState.manualMapping || { ...state.importState.parseResult.colMap };
      const val = sel.value === '' ? null : parseInt(sel.value, 10);
      current[sel.dataset.mapField] = val;
      state.importState.manualMapping = current;
      buildPreview();
    });
  });

  if (!hasPreview) return;

  // --- Vorschau-Zeilen: Events -------------------------------------------
  container.querySelectorAll('[data-preview-idx]').forEach(row => {
    const idx = parseInt(row.dataset.previewIdx, 10);
    const pr = state.importState.previewRows[idx];
    wireLazyRawDetails(row, pr.candidate.raw, pr.candidate.usedKeys);

    row.querySelector('[data-role="include"]').addEventListener('change', e => {
      pr.include = e.target.checked;
      updateImportSummary();
    });
    row.querySelector('[data-role="category"]').addEventListener('change', e => {
      pr.category = e.target.value;
    });
    const ruleCb = row.querySelector('[data-role="saveRule"]');
    const ruleInput = row.querySelector('[data-role="ruleKeyword"]');
    ruleCb.addEventListener('change', e => {
      pr.saveRule = e.target.checked;
      ruleInput.style.display = pr.saveRule ? '' : 'none';
    });
    ruleInput.addEventListener('input', e => { pr.ruleKeyword = e.target.value; });
  });

  document.getElementById('commitImportBtn').addEventListener('click', commitImport);
  document.getElementById('discardImportBtn').addEventListener('click', () => {
    state.importState = emptyImportState();
    renderImport(container);
  });
}

}

/* ========================================================================
   KATEGORISIEREN: RENDERING
   ======================================================================== */
function renderCategorize(container){
  const allUnclassified = store.transactions.filter(t => t.category === DEFAULT_CATEGORY);
  const searchQuery = state.categorizeSearch.trim().toLowerCase();
  const unclassified = searchQuery
    ? allUnclassified.filter(t => t.description.toLowerCase().includes(searchQuery))
    : allUnclassified;
  state.categorizeSelection = new Set([...state.categorizeSelection].filter(id => unclassified.some(t => t.id === id)));

  container.innerHTML = `
    <div class="view-header">
      <div>
        <h2>Kategorisieren</h2>
        <p class="view-sub">${allUnclassified.length} unklassifizierte Buchung(en)${searchQuery ? `, ${unclassified.length} davon gefunden` : ''}.</p>
      </div>
    </div>

    ${allUnclassified.length === 0 ? `
      <div class="card"><div class="empty-state"><div class="big">✅</div>Alles kategorisiert — keine offenen Buchungen.</div></div>
    ` : `
      <div class="card">
        <label class="field" style="max-width:320px; margin-bottom:14px;">Suche
          <input type="text" class="input" id="categorizeSearch" placeholder="Beschreibung durchsuchen …" value="${esc(state.categorizeSearch)}">
        </label>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:14px;">
          <label style="display:flex; align-items:center; gap:6px; font-weight:600; font-size:13.5px;">
            <input type="checkbox" id="selectAllCb"> Alle auswählen
          </label>
          <select id="bulkCategorySelect"><option value="">Kategorie wählen…</option>${categoryOptions(null)}</select>
          <button id="bulkAssignBtn" class="btn btn-secondary btn-sm">Ausgewählte zuweisen</button>
        </div>
        ${unclassified.length === 0 ? `
          <div class="empty-state"><div class="big">🔍</div>Keine Treffer für „${esc(state.categorizeSearch)}“.</div>
        ` : `
          <div class="txn-list">
            ${unclassified.map(t => renderCategorizeRow(t)).join('')}
          </div>
        `}
      </div>
    `}
  `;

  if (allUnclassified.length === 0) return;

  const searchInput = document.getElementById('categorizeSearch');
  let searchTimer = null;
  searchInput.addEventListener('input', e => {
    clearTimeout(searchTimer);
    const val = e.target.value;
    searchTimer = setTimeout(() => { state.categorizeSearch = val; renderCategorize(container); }, 300);
  });

  container.querySelectorAll('[data-txn-id]').forEach(row => {
    const id = row.dataset.txnId;
    const t = unclassified.find(x => x.id === id);
    if (t) wireLazyRawDetails(row, t.raw, t.usedKeys || []);
    const cb = row.querySelector('[data-role="select"]');
    if (cb){
      cb.checked = state.categorizeSelection.has(id);
      cb.addEventListener('change', e => {
        if (e.target.checked) state.categorizeSelection.add(id);
        else state.categorizeSelection.delete(id);
      });
    }
    const catSelect = row.querySelector('[data-role="category"]');
    const ruleCb = row.querySelector('[data-role="saveRule"]');
    const ruleInput = row.querySelector('[data-role="ruleKeyword"]');
    ruleCb.addEventListener('change', () => {
      ruleInput.style.display = ruleCb.checked ? '' : 'none';
    });
    catSelect.addEventListener('change', async () => {
      const category = catSelect.value;
      await setTransactionCategory(id, category);
      if (ruleCb.checked && ruleInput.value.trim()){
        await upsertRule(ruleInput.value.trim().toLowerCase(), category);
      }
      showToast('Kategorie gespeichert.', 'success');
    });
  });

  document.getElementById('selectAllCb').addEventListener('change', e => {
    unclassified.forEach(t => {
      if (e.target.checked) state.categorizeSelection.add(t.id);
      else state.categorizeSelection.delete(t.id);
    });
    renderCategorize(container);
  });

  document.getElementById('bulkAssignBtn').addEventListener('click', async () => {
    const category = document.getElementById('bulkCategorySelect').value;
    if (!category){ showToast('Bitte zuerst eine Kategorie auswählen.', 'error'); return; }
    const ids = [...state.categorizeSelection];
    await bulkAssignCategory(ids, category);
    state.categorizeSelection.clear();
  });
}

function renderCategorizeRow(t){
  const nameGuess = (t.description.split(' — ')[0] || '').toLowerCase();
  return `
    <div class="txn-row txn-row-categorize" data-txn-id="${t.id}">
      <input type="checkbox" data-role="select">
      <div class="date num">${formatDateDisplay(t.date)}</div>
      <div class="txn-desc">

        ${renderRawDetails(t.raw, t.usedKeys || [])}

      <div class="txn-actions">

}

              <tr data-rule-id="${r.id}">
                <td><code>${esc(r.keyword)}</code></td>
                <td><select data-role="ruleCategory">${categoryOptions(r.category)}</select></td>
                <td><button class="btn btn-danger btn-sm" data-role="deleteRule">🗑</button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
        </div>
      `}
    </div>
  `;

  const searchInput = document.getElementById('rulesSearch');
  let searchTimer = null;
  searchInput.addEventListener('input', e => {
    clearTimeout(searchTimer);
    const val = e.target.value;
    searchTimer = setTimeout(() => { state.rulesSearch = val; renderRules(container); }, 300);
  });

  document.getElementById('addRuleBtn').addEventListener('click', async () => {
    const keywordInput = document.getElementById('newRuleKeyword');
    const keyword = keywordInput.value.trim().toLowerCase();
    const category = document.getElementById('newRuleCategory').value;
    if (!keyword){ showToast('Bitte ein Schlüsselwort eingeben.', 'error'); return; }
    try {
      await upsertRule(keyword, category);
      showToast(`Regel „${keyword}“ → „${category}“ gespeichert.`, 'success');
      keywordInput.value = '';
    } catch (err){
      showToast('Fehler beim Speichern der Regel: ' + err.message, 'error');
    }
  });

  container.querySelectorAll('[data-rule-id]').forEach(row => {
    const id = row.dataset.ruleId;
    row.querySelector('[data-role="ruleCategory"]').addEventListener('change', async e => {
      try {
        await updateDoc(doc(db, RULES_COLLECTION, id), { category: e.target.value });
        showToast('Regel aktualisiert.', 'success');
      } catch (err){
        showToast('Fehler beim Aktualisieren: ' + err.message, 'error');
      }
    });
    row.querySelector('[data-role="deleteRule"]').addEventListener('click', () => deleteRule(id));
  });
}


/* ========================================================================
   ALLE BUCHUNGEN: RENDERING
   ======================================================================== */
function renderAllTransactions(container){
  const av = state.allView;
  const allMonthKeys = getAllMonthKeys(store.transactions);

  if (!av.monthInitialized){
    if (allMonthKeys.length) av.month = allMonthKeys[allMonthKeys.length - 1];
    av.monthInitialized = true;
  }

  let filtered = store.transactions;
  if (av.month !== 'all') filtered = filtered.filter(t => t.date.slice(0, 7) === av.month);
  if (av.category !== 'all') filtered = filtered.filter(t => t.category === av.category);
  if (av.search.trim()){
    const q = av.search.trim().toLowerCase();
    filtered = filtered.filter(t => t.description.toLowerCase().includes(q));
  }

  av.selection = new Set([...av.selection].filter(id => filtered.some(t => t.id === id)));
  const isAdmin = state.role === 'admin';
  const visible = filtered.slice(0, av.visibleCount);
  const hasMore = filtered.length > visible.length;

  container.innerHTML = `
    <div class="view-header">
      <div>
        <h2>Alle Buchungen</h2>
        <p class="view-sub">${filtered.length} von ${store.transactions.length} Buchungen${hasMore ? ` — ${visible.length} angezeigt` : ''}</p>
      </div>
    </div>

    <div class="card">
      <div class="dashboard-controls" style="grid-template-columns:1fr 1fr 2fr;">
        <label class="field">Monat
          <select id="filterMonth">
            <option value="all" ${av.month === 'all' ? 'selected' : ''}>Alle Monate</option>
            ${allMonthKeys.slice().reverse().map(mk => `<option value="${mk}" ${av.month === mk ? 'selected' : ''}>${monthLabel(mk)}</option>`).join('')}
          </select>
        </label>
        <label class="field">Kategorie
          <select id="filterCategory">
            <option value="all" ${av.category === 'all' ? 'selected' : ''}>Alle Kategorien</option>
            ${CATEGORIES.map(c => `<option value="${esc(c)}" ${av.category === c ? 'selected' : ''}>${esc(c)}</option>`).join('')}
          </select>
        </label>
        <label class="field">Suche
          <input type="text" class="input" id="filterSearch" placeholder="Beschreibung durchsuchen …" value="${esc(av.search)}">
        </label>
      </div>
      <div style="margin-top:14px;">
        <button id="exportCsvBtn" class="btn btn-secondary btn-sm">⬇ Als CSV exportieren (${filtered.length})</button>
      </div>
    </div>

    ${isAdmin ? `
      <div class="card">
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <label style="display:flex; align-items:center; gap:6px; font-weight:600; font-size:13.5px;">
            <input type="checkbox" id="selectAllAllCb"> Alle ${filtered.length} auswählen
          </label>
          <select id="bulkCategorySelectAll"><option value="">Kategorie wählen…</option>${categoryOptions(null)}</select>
          <button id="bulkAssignAllBtn" class="btn btn-secondary btn-sm">Ausgewählte zuweisen</button>
          <button id="bulkDeleteAllBtn" class="btn btn-danger btn-sm">Ausgewählte löschen</button>
        </div>
      </div>
    ` : ''}

    <div class="card">
      ${filtered.length === 0 ? `
        <div class="empty-state"><div class="big">🔍</div>Keine Buchungen gefunden.</div>
      ` : `
        <div class="txn-list">
          ${visible.map(t => renderAllRow(t, isAdmin)).join('')}
        </div>
        ${hasMore ? `
          <div style="text-align:center; margin-top:16px;">
            <button id="loadMoreBtn" class="btn btn-secondary">Weitere anzeigen (${filtered.length - visible.length} übrig)</button>
          </div>
        ` : ''}
      `}
    </div>
  `;

  document.getElementById('filterMonth').addEventListener('change', e => { av.month = e.target.value; av.visibleCount = 80; renderAllTransactions(container); });
  document.getElementById('filterCategory').addEventListener('change', e => { av.category = e.target.value; av.visibleCount = 80; renderAllTransactions(container); });
  document.getElementById('exportCsvBtn').addEventListener('click', () => {
    exportTransactionsCsv(filtered, `kontobuch-export-${todayIso()}.csv`);
  });
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  if (loadMoreBtn) loadMoreBtn.addEventListener('click', () => { av.visibleCount += 80; renderAllTransactions(container); });
  let searchTimer = null;
  document.getElementById('filterSearch').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const val = e.target.value;
    searchTimer = setTimeout(() => { av.search = val; av.visibleCount = 80; renderAllTransactions(container); }, 300);
  });

  container.querySelectorAll('[data-txn-id]').forEach(row => {
    const id = row.dataset.txnId;
    const t = filtered.find(x => x.id === id);
    if (t) wireLazyRawDetails(row, t.raw, t.usedKeys || []);
    const cb = row.querySelector('[data-role="select"]');
    if (cb){
      cb.checked = av.selection.has(id);
      cb.addEventListener('change', e => {
        if (e.target.checked) av.selection.add(id);
        else av.selection.delete(id);
      });
    }
    const catSelect = row.querySelector('[data-role="category"]');
    if (catSelect){
      catSelect.addEventListener('change', async () => {
        await setTransactionCategory(id, catSelect.value);
        showToast('Kategorie aktualisiert.', 'success');
      });
    }
    const delBtn = row.querySelector('[data-role="delete"]');
    if (delBtn) delBtn.addEventListener('click', () => deleteTransactionById(id));
  });

  if (isAdmin){
    document.getElementById('selectAllAllCb').addEventListener('change', e => {
      filtered.forEach(t => { if (e.target.checked) av.selection.add(t.id); else av.selection.delete(t.id); });
      renderAllTransactions(container);
    });
    document.getElementById('bulkAssignAllBtn').addEventListener('click', async () => {
      const category = document.getElementById('bulkCategorySelectAll').value;
      if (!category){ showToast('Bitte zuerst eine Kategorie auswählen.', 'error'); return; }
      const ids = [...av.selection];
      await bulkAssignCategory(ids, category);
      av.selection.clear();
    });
    document.getElementById('bulkDeleteAllBtn').addEventListener('click', async () => {
      const ids = [...av.selection];
      await bulkDeleteTransactions(ids);
      av.selection.clear();
    });
  }
}

function renderAllRow(t, isAdmin){
  return `
    <div class="txn-row ${isAdmin ? '' : 'compact'}" data-txn-id="${t.id}">
      ${isAdmin ? `<input type="checkbox" data-role="select">` : ''}
      <div class="date num">${formatDateDisplay(t.date)}</div>
      <div class="txn-desc">
        <div class="desc">${esc(t.description)}</div>
        ${renderRawDetails(t.raw, t.usedKeys || [])}
      </div>
      <div class="amount num ${t.amount >= 0 ? 'pos' : 'neg'}">${formatCurrency(t.amount)}</div>
      ${isAdmin ? `
        <div class="txn-actions">
          <select data-role="category">${categoryOptions(t.category)}</select>
          <button class="btn btn-danger btn-sm" data-role="delete" title="Löschen">🗑</button>
        </div>
      ` : `
        <div class="txn-actions"><span class="badge badge-neutral">${categoryDot(t.category)}${esc(t.category)}</span></div>
      `}
    </div>
  `;
}

</script>
</body>
</html>
