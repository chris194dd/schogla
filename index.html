<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gemeinschaftskonto</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root {
  color-scheme: light;
  --bg: #f5f6f8;
  --card: #ffffff;
  --border: #e2e4e9;
  --text: #1c1e21;
  --muted: #6b7280;
  --primary: #2f6f4f;
  --primary-dark: #235939;
  --danger: #b3261e;
  --expense: #c2542f;
  --income: #2f6f4f;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--text); }
.hidden { display: none !important; }
.muted { color: var(--muted); font-size: 0.9em; }
.error-text { color: var(--danger); min-height: 1.2em; font-size: 0.9em; }
.login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 12px; }
.login-card h1 { margin: 0; font-size: 1.4em; }
.login-card label { display: flex; flex-direction: column; gap: 4px; font-size: 0.9em; }
.login-card input { padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 1em; }
button { cursor: pointer; font-family: inherit; }
.login-card button[type="submit"] { margin-top: 8px; padding: 10px 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1em; }
.login-card button[type="submit"]:hover { background: var(--primary-dark); }
.app { min-height: 100vh; display: flex; flex-direction: column; }
.topbar { display: flex; align-items: center; gap: 24px; padding: 12px 24px; background: var(--card); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.brand { font-weight: 700; }
.tabs { display: flex; gap: 4px; flex: 1; flex-wrap: wrap; }
.tab-btn { background: none; border: none; padding: 8px 14px; border-radius: 8px; font-size: 0.95em; color: var(--muted); }
.tab-btn:hover { background: var(--bg); }
.tab-btn.active { background: var(--primary); color: white; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.link-btn { background: none; border: none; color: var(--muted); text-decoration: underline; font-size: 0.9em; }
.view-root { padding: 24px; max-width: 1100px; margin: 0 auto; width: 100%; }
.card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
.card h2 { margin-top: 0; font-size: 1.1em; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }

@media (max-width: 700px) { .grid-3, .grid-2 { grid-template-columns: 1fr; } }

.stat .value.expense { color: var(--expense); }
.stat .value.income { color: var(--income); }
table { width: 100%; border-collapse: collapse; font-size: 0.92em; }
th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
th { color: var(--muted); font-weight: 600; font-size: 0.85em; text-transform: uppercase; }
tr:hover td { background: #fafafa; }
.amount { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }
.amount.negative { color: var(--expense); }
.amount.positive { color: var(--income); }
select, input[type="text"], input[type="search"], input[type="month"], input[type="file"] { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.92em; font-family: inherit; }
.btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); font-size: 0.9em; }
.btn:hover { background: var(--bg); }
.btn-primary { background: var(--primary); border-color: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.btn-danger { color: var(--danger); }
.toolbar { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 999px; background: var(--bg); font-size: 0.8em; border: 1px solid var(--border); }
.badge.uncategorized { background: #fdecea; color: var(--danger); border-color: #f5c6c2; }
.dropzone { border: 2px dashed var(--border); border-radius: 12px; padding: 32px; text-align: center; color: var(--muted); cursor: pointer; }
.dropzone.dragover { border-color: var(--primary); background: #f0f7f3; }
.chart-wrap { position: relative; height: 320px; }
.empty-state { text-align: center; color: var(--muted); padding: 40px 20px; }
.toast { position: fixed; bottom: 20px; right: 20px; background: #1c1e21; color: white; padding: 12px 18px; border-radius: 8px; font-size: 0.9em; z-index: 100; }

<script type="module">

  query,
  orderBy,

const firebaseConfig = {

  authDomain: "skabatical-budgetplaner.firebaseapp.com",
  projectId: "skabatical-budgetplaner",
  storageBucket: "skabatical-budgetplaner.firebasestorage.app",

  appId: "1:241961422579:web:2da5d0e3e83b321d223186",
};

// Eigene, mit "kontoapp_" prefixte Collection-Namen, damit nichts mit den
// Daten der beiden bestehenden Artefakt-Apps im selben Firebase-Projekt
// kollidiert.
const TX_COLLECTION = "kontoapp_transactions";
const RULES_COLLECTION = "kontoapp_rules";

const CATEGORIES = [
  "Essen + Trinken",
  "Gastronomie / Freizeit",
  "Wohnung",
  "Einkünfte",
  "Urlaub",
  "Auto",
  "Hund",
  "nicht klassifiziert",
];
const UNCATEGORIZED = "nicht klassifiziert";
const INCOME_CATEGORY = "Einkünfte";

// Admin (darf importieren/kategorisieren/löschen) vs. reiner Betrachter.
const ADMIN_UID = "RBqwudtIIfdFGWrANV6s2RhhiGo2";

/* ============================================================
   2) FIREBASE INIT
   ============================================================ */
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);

/* ============================================================
   3) CSV-PARSER (für Bank-Exporte, z.B. DKB)
   ============================================================ */
function parseLine(line, delimiter) {
  const cells = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (inQuotes) {
      if (ch === '"') {
        if (line[i + 1] === '"') { cur += '"'; i++; }
        else { inQuotes = false; }
      } else { cur += ch; }
    } else {
      if (ch === '"') { inQuotes = true; }
      else if (ch === delimiter) { cells.push(cur); cur = ""; }
      else { cur += ch; }
    }
  }
  cells.push(cur);
  return cells.map((c) => c.trim());
}

function detectDelimiter(line) {
  const semi = (line.match(/;/g) || []).length;
  const comma = (line.match(/,/g) || []).length;
  return semi >= comma ? ";" : ",";
}

function detectHeaderRow(lines, delimiter) {
  for (let i = 0; i < Math.min(lines.length, 25); i++) {
    const cells = parseLine(lines[i], delimiter).map((c) => c.toLowerCase());
    const hasDate = cells.some((c) => c.includes("datum"));
    const hasAmount = cells.some((c) => c.includes("betrag"));
    if (hasDate && hasAmount) return i;
  }
  return 0;
}

function guessColumn(headers, patterns) {
  const lower = headers.map((h) => h.toLowerCase());
  for (const p of patterns) {
    const idx = lower.findIndex((h) => h.includes(p));
    if (idx !== -1) return idx;
  }
  return -1;
}

function analyzeCsv(rawText) {
  const text = rawText.replace(/^﻿/, "").replace(/\r\n/g, "\n");
  const lines = text.split("\n").filter((l) => l.trim().length > 0);
  if (lines.length === 0) return { error: "Die Datei enthält keine Zeilen." };

  const delimiter = detectDelimiter(lines[Math.min(4, lines.length - 1)]);
  const headerRowIndex = detectHeaderRow(lines, delimiter);
  const headers = parseLine(lines[headerRowIndex], delimiter);
  const dataLines = lines.slice(headerRowIndex + 1);
  const rows = dataLines.map((l) => parseLine(l, delimiter));

  const dateCol = guessColumn(headers, ["buchungsdatum", "datum"]);
  const amountCol = guessColumn(headers, ["betrag"]);
  const payeeCol = guessColumn(headers, ["zahlungsempfänger", "zahlungsempfaenger", "empfänger", "name"]);
  const purposeCol = guessColumn(headers, ["verwendungszweck", "buchungstext"]);
  const statusCol = guessColumn(headers, ["status"]);

  return {
    delimiter,
    headerRowIndex,
    headers,
    rows,
    guess: {
      dateCol,
      amountCol,
      descriptionCols: [payeeCol, purposeCol].filter((c) => c !== -1),
      statusCol,
    },
  };
}

// Baut aus einer Rohzeile ein Objekt {Spaltenname: Wert} für alle Spalten -
// damit geht beim Import nichts verloren, auch wenn nur ein Teil der
// Felder in der App direkt angezeigt wird.
function buildRawObject(headers, row) {
  const obj = {};
  headers.forEach((h, i) => {
    const key = (h || `spalte_${i + 1}`).trim();
    if (!key) return;
    obj[key] = row[i] !== undefined ? row[i] : "";
  });
  return obj;
}

function parseGermanDate(str) {
  if (!str) return null;
  const s = str.trim();
  let m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
  if (m) { const [, d, mo, y] = m; return `${y}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`; }
  m = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{2})$/);
  if (m) { const [, d, mo, y] = m; const year = 2000 + parseInt(y, 10); return `${year}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`; }
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})$/);
  if (m) { const [, y, mo, d] = m; return `${y}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`; }
  return null;
}

function parseGermanAmount(str) {
  if (str === null || str === undefined) return NaN;
  let s = String(str).trim().replace(/[€\s]/g, "");
  if (s === "") return NaN;
  if (s.includes(",")) s = s.replace(/\./g, "").replace(",", ".");
  return parseFloat(s);
}

function buildDescription(row, cols) {
  return cols.map((c) => row[c]).filter((v) => v && v.trim().length > 0).join(" — ");
}

async function hashTransaction(date, amount, rawRow) {
  const input = `${date}|${amount}|${rawRow.join("|")}`;
  const enc = new TextEncoder().encode(input);
  const digest = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(digest)).map((b) => b.toString(16).padStart(2, "0")).join("").slice(0, 24);
}

/* ============================================================
   4) DATENSPEICHER (Firestore, live synchron)
   ============================================================ */
const listeners = new Set();
let transactions = [];
let rules = [];
let unsubTx = null;
let unsubRules = null;

function notify() { for (const fn of listeners) fn(); }

const store = {
  get transactions() { return transactions; },
  get rules() { return rules; },
  subscribe(fn) { listeners.add(fn); return () => listeners.delete(fn); },
  start() {
    if (unsubTx) return;
    const txQuery = query(collection(db, TX_COLLECTION), orderBy("date", "desc"));
    unsubTx = onSnapshot(txQuery, (snap) => {
      transactions = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      notify();
    });
    const rulesQuery = query(collection(db, RULES_COLLECTION));
    unsubRules = onSnapshot(rulesQuery, (snap) => {
      rules = snap.docs.map((d) => ({ id: d.id, ...d.data() }));
      notify();
    });
  },
  stop() {
    if (unsubTx) unsubTx();
    if (unsubRules) unsubRules();
    unsubTx = null; unsubRules = null;
    transactions = []; rules = [];
  },
};

function suggestCategory(description) {
  const lower = description.toLowerCase();
  const hit = rules.find((r) => lower.includes(r.keyword.toLowerCase()));
  return hit ? hit.category : UNCATEGORIZED;
}

async function importTransactions(newTxs) {
  const existingHashes = new Set(transactions.map((t) => t.hash));
  const toImport = newTxs.filter((t) => !existingHashes.has(t.hash));
  const skipped = newTxs.length - toImport.length;
  const CHUNK = 400;
  for (let i = 0; i < toImport.length; i += CHUNK) {
    const batch = writeBatch(db);
    for (const tx of toImport.slice(i, i + CHUNK)) {
      const ref = doc(collection(db, TX_COLLECTION));
      batch.set(ref, { ...tx, createdAt: serverTimestamp() });
    }
    await batch.commit();
  }
  return { imported: toImport.length, skipped };
}

async function updateTransactionCategory(id, category) {
  await updateDoc(doc(db, TX_COLLECTION, id), { category });
}
async function updateTransactionsCategoryBulk(ids, category) {
  const CHUNK = 400; // Firestore Batch-Limit ist 500 Schreibvorgänge
  for (let i = 0; i < ids.length; i += CHUNK) {
    const batch = writeBatch(db);
    for (const id of ids.slice(i, i + CHUNK)) {
      batch.update(doc(db, TX_COLLECTION, id), { category });
    }
    await batch.commit();
  }
}
async function deleteTransaction(id) {
  await deleteDoc(doc(db, TX_COLLECTION, id));
}
async function addRule(keyword, category) {
  const lower = keyword.trim().toLowerCase();
  if (!lower) return;
  if (rules.some((r) => r.keyword.toLowerCase() === lower)) return;
  await addDoc(collection(db, RULES_COLLECTION), { keyword: lower, category, createdAt: serverTimestamp() });
}

/* ============================================================
   5) HILFSFUNKTIONEN
   ============================================================ */
function fmtEuro(n) {
  return n.toLocaleString("de-DE", { style: "currency", currency: "EUR" });
}
function escapeHtml(str) {
  return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

// Klappbare Detailansicht mit allen ungenutzten Original-CSV-Feldern
// (IBAN, Zahlungspflichtige*r, Mandatsreferenz, Status, ...), damit nichts
// verloren geht, ohne die Tabellen zuzumüllen.
function rawDetailsHtml(raw) {
  if (!raw) return "";
  const entries = Object.entries(raw).filter(([, v]) => v !== undefined && v !== null && String(v).trim() !== "");
  if (entries.length === 0) return "";
  return `<details style="margin-top:4px;">
    <summary class="muted" style="cursor:pointer; font-size:0.8em;">Details</summary>
    <div style="font-size:0.8em; margin-top:4px; display:grid; grid-template-columns:auto 1fr; gap:2px 10px;">
      ${entries.map(([k, v]) => `<span class="muted">${escapeHtml(k)}</span><span>${escapeHtml(v)}</span>`).join("")}
    </div>
  </details>`;
}
function showToast(message) {
  const el = document.createElement("div");
  el.className = "toast";
  el.textContent = message;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

/* ============================================================
   6) VIEW: ÜBERSICHT / DASHBOARD
   ============================================================ */
let categoryChart = null;
let trendChart = null;
let dashFilters = { mode: "month", month: "", from: "", to: "", category: "" };

function currentMonthValue() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}`;
}
function monthLabel(ym) {
  const [y, m] = ym.split("-");
  return new Date(Number(y), Number(m) - 1, 1).toLocaleDateString("de-DE", { month: "long", year: "numeric" });
}
function allMonthsSorted() {
  return Array.from(new Set(store.transactions.map((t) => t.date.slice(0, 7)))).sort();
}

// Durchschnittliche Ausgaben pro Kategorie/insgesamt über alle Monate mit
// Daten. excludeMonth kann den gerade betrachteten Monat rausnehmen, damit
// "dieser Monat vs. Durchschnitt der übrigen Monate" fair verglichen wird.
function computeAverages(excludeMonth) {
  const months = allMonthsSorted();
  const pool = excludeMonth ? months.filter((m) => m !== excludeMonth) : months;
  const numMonths = pool.length;
  const perCategory = {};
  CATEGORIES.forEach((cat) => {
    if (numMonths === 0) { perCategory[cat] = null; return; }
    const total = Math.abs(
      store.transactions.filter((t) => pool.includes(t.date.slice(0, 7)) && t.category === cat).reduce((s, t) => s + t.amount, 0)
    );
    perCategory[cat] = total / numMonths;
  });
  const totalExpense = numMonths === 0 ? null :
    Math.abs(store.transactions.filter((t) => pool.includes(t.date.slice(0, 7)) && t.amount < 0).reduce((s, t) => s + t.amount, 0)) / numMonths;
  return { perCategory, totalExpense, numMonths };
}

function comparisonBadgeHtml(actual, average) {
  if (average === null || average === undefined || average === 0) {
    return '<span class="muted">kein Vergleichswert (zu wenig Monatsdaten)</span>';
  }
  const diffPct = ((actual - average) / average) * 100;
  const over = diffPct >= 0;
  const cls = Math.abs(diffPct) < 5 ? "muted" : over ? "expense" : "income";
  return `<span class="${cls}" style="font-weight:600;">${over ? "+" : ""}${diffPct.toFixed(0)}% ${over ? "über" : "unter"} Ø</span> <span class="muted">(Ø ${fmtEuro(average)})</span>`;
}

function monthlyCategoryExpenses(category, months) {
  return months.map((m) =>
    Math.abs(store.transactions.filter((t) => t.date.startsWith(m) && t.category === category).reduce((s, t) => s + t.amount, 0))
  );
}

function renderDashboard(root) {
  const availableMonths = allMonthsSorted();
  if (!dashFilters.month) {
    dashFilters.month = availableMonths.includes(currentMonthValue())
      ? currentMonthValue()
      : availableMonths[availableMonths.length - 1] || currentMonthValue();
  }

  root.innerHTML = `
    <div class="toolbar">
      <label>Zeitraum
        <select id="dash-mode">
          <option value="month" ${dashFilters.mode === "month" ? "selected" : ""}>Monat</option>
          <option value="range" ${dashFilters.mode === "range" ? "selected" : ""}>Zeitraum (von-bis)</option>
        </select>
      </label>
      <span id="dash-period-inputs" style="display:flex; gap:12px;"></span>
      <label>Kategorie
        <select id="dash-category">
          <option value="">Alle Kategorien</option>
          ${CATEGORIES.map((c) => `<option value="${escapeHtml(c)}" ${dashFilters.category === c ? "selected" : ""}>${escapeHtml(c)}</option>`).join("")}
        </select>
      </label>
    </div>
    <div id="dash-content"></div>
  `;

  const modeSelect = root.querySelector("#dash-mode");
  const categorySelect = root.querySelector("#dash-category");
  const periodInputsEl = root.querySelector("#dash-period-inputs");

  function renderPeriodInputs() {
    if (dashFilters.mode === "month") {
      periodInputsEl.innerHTML = `<label>Monat <input type="month" id="dash-month" value="${dashFilters.month}" /></label>`;
      periodInputsEl.querySelector("#dash-month").addEventListener("change", (e) => {
        dashFilters.month = e.target.value;
        renderDashboardContent(root);
      });
    } else {
      periodInputsEl.innerHTML = `
        <label>Von <input type="date" id="dash-from" value="${dashFilters.from}" /></label>
        <label>Bis <input type="date" id="dash-to" value="${dashFilters.to}" /></label>
      `;
      periodInputsEl.querySelector("#dash-from").addEventListener("change", (e) => { dashFilters.from = e.target.value; renderDashboardContent(root); });
      periodInputsEl.querySelector("#dash-to").addEventListener("change", (e) => { dashFilters.to = e.target.value; renderDashboardContent(root); });
    }
  }
  renderPeriodInputs();

  modeSelect.addEventListener("change", () => {
    dashFilters.mode = modeSelect.value;
    renderPeriodInputs();
    renderDashboardContent(root);
  });
  categorySelect.addEventListener("change", () => {
    dashFilters.category = categorySelect.value;
    renderDashboardContent(root);
  });

  renderDashboardContent(root);
}

function renderDashboardContent(root) {
  const content = root.querySelector("#dash-content");

  let txs, periodLabel, excludeMonthForAvg;
  if (dashFilters.mode === "month") {
    txs = store.transactions.filter((t) => t.date.startsWith(dashFilters.month));
    periodLabel = monthLabel(dashFilters.month);
    excludeMonthForAvg = dashFilters.month;
  } else if (dashFilters.from && dashFilters.to) {
    txs = store.transactions.filter((t) => t.date >= dashFilters.from && t.date <= dashFilters.to);
    periodLabel = `${dashFilters.from} – ${dashFilters.to}`;
    excludeMonthForAvg = null;
  } else {
    txs = [];
    periodLabel = "Zeitraum wählen";
    excludeMonthForAvg = null;
  }

  if (dashFilters.category) txs = txs.filter((t) => t.category === dashFilters.category);

  const income = txs.filter((t) => t.amount > 0).reduce((s, t) => s + t.amount, 0);
  const expenses = txs.filter((t) => t.amount < 0).reduce((s, t) => s + t.amount, 0);
  const saldo = income + expenses;
  const uncategorizedCount = txs.filter((t) => t.category === UNCATEGORIZED).length;
  const averages = dashFilters.mode === "month" ? computeAverages(excludeMonthForAvg) : null;

  let statsHtml;
  if (dashFilters.category) {
    const isIncomeCat = dashFilters.category === INCOME_CATEGORY;
    const catTotal = Math.abs(txs.reduce((s, t) => s + t.amount, 0));
    const avgForCat = averages ? averages.perCategory[dashFilters.category] : null;
    statsHtml = `
      <div class="grid-2">
        <div class="card stat">
          <div class="label">${isIncomeCat ? "Eingenommen" : "Ausgegeben"} in "${escapeHtml(dashFilters.category)}" — ${periodLabel}</div>
          <div class="value ${isIncomeCat ? "income" : "expense"}">${fmtEuro(catTotal)}</div>
        </div>
        <div class="card stat">
          <div class="label">Vergleich zum Monatsdurchschnitt</div>
          <div class="value" style="font-size:1.1em;">${averages ? comparisonBadgeHtml(catTotal, avgForCat) : '<span class="muted">nur im Monats-Modus verfügbar</span>'}</div>
        </div>
      </div>
    `;
  } else {
    statsHtml = `
      <div class="grid-3">
        <div class="card stat"><div class="label">Einnahmen — ${periodLabel}</div><div class="value income">${fmtEuro(income)}</div></div>
        <div class="card stat">
          <div class="label">Ausgaben — ${periodLabel}</div>
          <div class="value expense">${fmtEuro(Math.abs(expenses))}</div>
          ${averages ? `<div style="margin-top:6px; font-size:0.85em;">${comparisonBadgeHtml(Math.abs(expenses), averages.totalExpense)}</div>` : ""}
        </div>
        <div class="card stat"><div class="label">Saldo</div><div class="value">${fmtEuro(saldo)}</div></div>
      </div>
    `;
  }

  const expenseCategories = CATEGORIES.filter((c) => c !== INCOME_CATEGORY);
  const sums = expenseCategories.map((cat) =>
    Math.abs(txs.filter((t) => t.category === cat && t.amount < 0).reduce((s, t) => s + t.amount, 0))
  );

  const categorySectionHtml = dashFilters.category
    ? ""
    : `
    <div class="card">
      <h2>Ausgaben nach Kategorie${averages ? " (vs. Ø anderer Monate)" : ""}</h2>
      ${txs.length === 0 ? '<div class="empty-state">Keine Buchungen in diesem Zeitraum.</div>' : `
        <div class="chart-wrap"><canvas id="category-chart"></canvas></div>
        <table style="margin-top:16px;">
          <thead><tr><th>Kategorie</th><th class="amount">${periodLabel}</th><th class="amount">Ø / Monat</th><th>Vergleich</th></tr></thead>
          <tbody>
            ${expenseCategories.map((cat, i) => `
              <tr>
                <td>${escapeHtml(cat)}</td>
                <td class="amount">${fmtEuro(sums[i])}</td>
                <td class="amount">${averages && averages.perCategory[cat] !== null ? fmtEuro(averages.perCategory[cat]) : "–"}</td>
                <td>${averages ? comparisonBadgeHtml(sums[i], averages.perCategory[cat]) : '<span class="muted">–</span>'}</td>
              </tr>`).join("")}
          </tbody>
        </table>
      `}
    </div>
  `;

  const months = allMonthsSorted();
  const trendTitle = dashFilters.category ? `Verlauf: ${dashFilters.category} pro Monat` : "Verlauf (Saldo pro Monat)";

  content.innerHTML = `
    ${statsHtml}
    ${uncategorizedCount > 0 ? `<div class="card"><span class="badge uncategorized">${uncategorizedCount} Buchung(en) noch nicht klassifiziert</span></div>` : ""}
    ${categorySectionHtml}
    <div class="card">
      <h2>${trendTitle}</h2>
      ${months.length === 0 ? '<div class="empty-state">Noch keine Buchungen importiert.</div>' : '<div class="chart-wrap"><canvas id="trend-chart"></canvas></div>'}
    </div>
  `;

  if (categoryChart) { categoryChart.destroy(); categoryChart = null; }
  if (!dashFilters.category && txs.length > 0) {
    const datasets = [{ label: periodLabel, data: sums, backgroundColor: "#c2542f", borderRadius: 4 }];
    if (averages) {
      datasets.push({
        label: "Ø pro Monat",
        data: expenseCategories.map((cat) => averages.perCategory[cat] || 0),
        backgroundColor: "#c2c7ce",
        borderRadius: 4,
      });
    }
    categoryChart = new Chart(content.querySelector("#category-chart"), {
      type: "bar",
      data: { labels: expenseCategories, datasets },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: true } }, scales: { y: { beginAtZero: true } } },
    });
  }

  if (trendChart) { trendChart.destroy(); trendChart = null; }
  if (months.length > 0) {
    let trendDatasets;
    if (dashFilters.category) {
      const catTrend = monthlyCategoryExpenses(dashFilters.category, months);
      const allTimeAvg = computeAverages(null).perCategory[dashFilters.category] || 0;
      trendDatasets = [
        { label: dashFilters.category, data: catTrend, borderColor: "#2f6f4f", backgroundColor: "rgba(47,111,79,0.1)", fill: true, tension: 0.2 },
        { label: "Ø gesamt", data: months.map(() => allTimeAvg), borderColor: "#9aa1ab", borderDash: [6, 4], pointRadius: 0, fill: false },
      ];
    } else {
      const trendData = months.map((m) => store.transactions.filter((t) => t.date.startsWith(m)).reduce((s, t) => s + t.amount, 0));
      trendDatasets = [{ label: "Saldo (€)", data: trendData, borderColor: "#2f6f4f", backgroundColor: "rgba(47,111,79,0.1)", fill: true, tension: 0.2 }];
    }
    trendChart = new Chart(content.querySelector("#trend-chart"), {
      type: "line",
      data: { labels: months.map(monthLabel), datasets: trendDatasets },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: !!dashFilters.category } } },
    });
  }
}

function renderImport(root) {
  root.innerHTML = `
    <div class="card">
      <h2>CSV importieren</h2>
      <p class="muted">Exportiere die Umsatzliste eures Bankkontos als CSV und lade sie hier hoch.</p>
      <div id="dropzone" class="dropzone">
        <input type="file" id="file-input" accept=".csv,text/csv" class="hidden" />
        <p>Datei hierher ziehen oder klicken zum Auswählen</p>
      </div>
      <details style="margin-top:12px">
        <summary class="muted" style="cursor:pointer">Oder CSV-Inhalt einfügen</summary>
        <textarea id="paste-area" rows="6" style="width:100%; margin-top:8px; font-family:monospace; font-size:0.85em;" placeholder="CSV-Inhalt hier einfügen..."></textarea>
        <button class="btn" id="paste-btn" style="margin-top:8px">Einfügen übernehmen</button>
      </details>
    </div>
    <div id="mapping-root"></div>
  `;

  const dropzone = root.querySelector("#dropzone");
  const fileInput = root.querySelector("#file-input");
  dropzone.addEventListener("click", () => fileInput.click());
  dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
  dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
  dropzone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropzone.classList.remove("dragover");
    const file = e.dataTransfer.files[0];
    if (file) readFile(file, root);
  });
  fileInput.addEventListener("change", () => { if (fileInput.files[0]) readFile(fileInput.files[0], root); });
  root.querySelector("#paste-btn").addEventListener("click", () => {
    const text = root.querySelector("#paste-area").value;
    if (text.trim()) handleCsvText(text, root);
  });
}

function readFile(file, root) {
  const reader = new FileReader();
  reader.onload = () => handleCsvText(reader.result, root);
  reader.readAsText(file, "UTF-8");
}

function handleCsvText(text, root) {
  const analyzed = analyzeCsv(text);
  const mappingRoot = root.querySelector("#mapping-root");
  if (analyzed.error) {
    mappingRoot.innerHTML = `<div class="card"><p class="error-text">${analyzed.error}</p></div>`;
    return;
  }
  renderMapping(mappingRoot, analyzed);
}

function renderMapping(root, analyzed) {
  const { headers, guess } = analyzed;
  const colOptions = headers.map((h, i) => `<option value="${i}">${escapeHtml(h)}</option>`).join("");

  root.innerHTML = `
    <div class="card">
      <p class="muted">${analyzed.rows.length} Buchungszeile(n) erkannt (Kopfzeile: Zeile ${analyzed.headerRowIndex + 1}, Trennzeichen "${analyzed.delimiter}"). Spalten wurden automatisch zugeordnet, alle ${headers.length} Original-Spalten werden unabhängig davon vollständig mitgespeichert.</p>
      <details>
        <summary class="muted" style="cursor:pointer">Spalten-Zuordnung anpassen (normalerweise nicht nötig)</summary>
        <div class="grid-3" style="margin-top:12px">
          <label>Datum-Spalte <select id="map-date">${colOptions}</select></label>
          <label>Betrag-Spalte <select id="map-amount">${colOptions}</select></label>
          <label>Beschreibung-Spalte(n) <select id="map-desc" multiple size="4">${colOptions}</select></label>
        </div>
        <button class="btn btn-primary" id="build-preview-btn" style="margin-top:16px">Vorschau neu erzeugen</button>
      </details>
    </div>
    <div id="preview-root"></div>
  `;

  const dateSel = root.querySelector("#map-date");
  const amountSel = root.querySelector("#map-amount");
  const descSel = root.querySelector("#map-desc");
  if (guess.dateCol !== -1) dateSel.value = String(guess.dateCol);
  if (guess.amountCol !== -1) amountSel.value = String(guess.amountCol);
  Array.from(descSel.options).forEach((opt) => { if (guess.descriptionCols.includes(Number(opt.value))) opt.selected = true; });

  const previewRoot = root.querySelector("#preview-root");

  root.querySelector("#build-preview-btn").addEventListener("click", () => {
    const dateCol = Number(dateSel.value);
    const amountCol = Number(amountSel.value);
    const descCols = Array.from(descSel.selectedOptions).map((o) => Number(o.value));
    buildPreview(previewRoot, analyzed, { dateCol, amountCol, descCols, statusCol: guess.statusCol });
  });

  // Direkt mit der automatischen Zuordnung starten - kein Klick nötig.
  if (guess.dateCol !== -1 && guess.amountCol !== -1) {
    buildPreview(previewRoot, analyzed, {
      dateCol: guess.dateCol,
      amountCol: guess.amountCol,
      descCols: guess.descriptionCols,
      statusCol: guess.statusCol,
    });
  } else {
    previewRoot.innerHTML = `<div class="card"><p class="error-text">Datum- oder Betrag-Spalte konnte nicht automatisch erkannt werden. Bitte oben unter "Spalten-Zuordnung anpassen" manuell auswählen.</p></div>`;
  }
}

async function buildPreview(previewRoot, analyzed, mapping) {
  previewRoot.innerHTML = `<div class="card"><p class="muted">Verarbeite...</p></div>`;

  const rows = [];
  let skippedPending = 0;
  for (const raw of analyzed.rows) {
    if (raw.length <= Math.max(mapping.dateCol, mapping.amountCol)) continue;
    if (mapping.statusCol !== -1 && mapping.statusCol !== undefined) {
      const status = (raw[mapping.statusCol] || "").toLowerCase();
      if (status.includes("vorgemerkt")) { skippedPending++; continue; }
    }
    const date = parseGermanDate(raw[mapping.dateCol]);
    const amount = parseGermanAmount(raw[mapping.amountCol]);
    if (!date || Number.isNaN(amount)) continue;
    const description = buildDescription(raw, mapping.descCols) || "(ohne Beschreibung)";
    const hash = await hashTransaction(date, amount, raw);
    const category = suggestCategory(description);
    const rawObject = buildRawObject(analyzed.headers, raw);
    rows.push({
      date,
      amount,
      description,
      category,
      hash,
      raw: rawObject,
      rememberKeyword: mapping.descCols.length ? raw[mapping.descCols[0]] : "",
    });
  }
  rows.sort((a, b) => (a.date < b.date ? 1 : -1));

  const existingHashes = new Set(store.transactions.map((t) => t.hash));
  const duplicateCount = rows.filter((r) => existingHashes.has(r.hash)).length;
  renderPreview(previewRoot, rows, duplicateCount, skippedPending);
}

function renderPreview(root, rows, duplicateCount, skippedPending) {
  const catOptions = CATEGORIES.map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

  root.innerHTML = `
    <div class="card">
      <h2>Vorschau (${rows.length} Buchungen)</h2>
      ${duplicateCount > 0 ? `<p class="muted">${duplicateCount} Buchung(en) scheinen bereits importiert zu sein und werden beim Import übersprungen.</p>` : ""}
      ${skippedPending > 0 ? `<p class="muted">${skippedPending} vorgemerkte (noch nicht gebuchte) Buchung(en) wurden automatisch ausgelassen.</p>` : ""}
      <div style="max-height:480px; overflow:auto; margin-top:8px;">
      <table>
        <thead><tr><th>Datum</th><th>Beschreibung</th><th class="amount">Betrag</th><th>Kategorie</th><th>Regel merken</th></tr></thead>
        <tbody>
          ${rows.map((r, i) => `
            <tr data-idx="${i}">
              <td>${r.date}</td>
              <td>${escapeHtml(r.description)}${rawDetailsHtml(r.raw)}</td>
              <td class="amount ${r.amount < 0 ? "negative" : "positive"}">${fmtEuro(r.amount)}</td>
              <td><select class="cat-select" data-idx="${i}">${catOptions}</select></td>
              <td>
                <label style="display:flex; align-items:center; gap:6px; font-size:0.85em;">
                  <input type="checkbox" class="remember-cb" data-idx="${i}" />
                  <input type="text" class="remember-kw" data-idx="${i}" value="${escapeHtml(r.rememberKeyword)}" disabled style="width:140px" />
                </label>
              </td>
            </tr>`).join("")}
        </tbody>
      </table>
      </div>
      <div class="toolbar" style="margin-top:16px">
        <button class="btn btn-primary" id="import-btn">Importieren</button>
        <span id="import-status" class="muted"></span>
      </div>
    </div>
  `;

  root.querySelectorAll(".cat-select").forEach((sel) => {
    const idx = Number(sel.dataset.idx);
    sel.value = rows[idx].category;
    sel.addEventListener("change", () => (rows[idx].category = sel.value));
  });
  root.querySelectorAll(".remember-cb").forEach((cb) => {
    cb.addEventListener("change", () => {
      const idx = Number(cb.dataset.idx);
      root.querySelector(`.remember-kw[data-idx="${idx}"]`).disabled = !cb.checked;
    });
  });
  root.querySelectorAll(".remember-kw").forEach((input) => {
    input.addEventListener("input", () => { rows[Number(input.dataset.idx)].rememberKeyword = input.value; });
  });

  root.querySelector("#import-btn").addEventListener("click", async () => {
    const btn = root.querySelector("#import-btn");
    const status = root.querySelector("#import-status");
    btn.disabled = true;
    status.textContent = "Importiere...";
    try {
      const txsToImport = rows.map(({ rememberKeyword, ...tx }) => tx);
      const result = await importTransactions(txsToImport);
      const rememberChecks = Array.from(root.querySelectorAll(".remember-cb")).filter((cb) => cb.checked);
      for (const cb of rememberChecks) {
        const idx = Number(cb.dataset.idx);
        const kw = rows[idx].rememberKeyword;
        if (kw && kw.trim()) await addRule(kw, rows[idx].category);
      }
      status.textContent = `${result.imported} importiert, ${result.skipped} übersprungen (Duplikate).`;
      showToast(`${result.imported} Buchungen importiert`);
    } catch (err) {
      status.textContent = "Fehler beim Import: " + err.message;
    } finally {
      btn.disabled = false;
    }
  });
}

function renderCategorize(root) {
  const items = store.transactions.filter((t) => t.category === UNCATEGORIZED).sort((a, b) => (a.date < b.date ? 1 : -1));
  const catOptions = CATEGORIES.filter((c) => c !== UNCATEGORIZED).map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

  root.innerHTML = `
    <div class="card">
      <h2>Nicht klassifizierte Buchungen (${items.length})</h2>
      ${items.length === 0 ? '<div class="empty-state">Alles kategorisiert. 🎉</div>' : `
        <div class="toolbar">
          <label style="display:flex; align-items:center; gap:6px;"><input type="checkbox" id="select-all-cb" /> Alle auswählen</label>
          <span id="selected-count" class="muted">0 ausgewählt</span>
          <select id="bulk-cat-select">
            <option value="">Kategorie für Auswahl...</option>
            ${catOptions}
          </select>
          <button class="btn btn-primary" id="bulk-assign-btn" disabled>Zuweisen</button>
        </div>
        <div style="max-height:600px; overflow:auto;">
        <table>
          <thead><tr><th></th><th>Datum</th><th>Beschreibung</th><th class="amount">Betrag</th><th>Kategorie</th><th>Regel merken</th></tr></thead>
          <tbody>
            ${items.map((t) => `
              <tr data-id="${t.id}">
                <td><input type="checkbox" class="row-cb" data-id="${t.id}" /></td>
                <td>${t.date}</td>
                <td>${escapeHtml(t.description)}${rawDetailsHtml(t.raw)}</td>
                <td class="amount ${t.amount < 0 ? "negative" : "positive"}">${fmtEuro(t.amount)}</td>
                <td>
                  <select class="cat-select" data-id="${t.id}">
                    <option value="">Kategorie wählen...</option>
                    ${catOptions}
                  </select>
                </td>
                <td>
                  <label style="display:flex; align-items:center; gap:6px; font-size:0.85em;">
                    <input type="checkbox" class="remember-cb" data-id="${t.id}" /> Regel merken
                  </label>
                </td>
              </tr>`).join("")}
          </tbody>
        </table>
        </div>`}
    </div>
  `;

  root.querySelectorAll(".cat-select").forEach((sel) => {
    sel.addEventListener("change", async () => {
      const id = sel.dataset.id;
      const category = sel.value;
      if (!category) return;
      sel.disabled = true;
      try {
        await updateTransactionCategory(id, category);
        const tx = store.transactions.find((t) => t.id === id);
        const rememberCb = root.querySelector(`.remember-cb[data-id="${id}"]`);
        if (rememberCb && rememberCb.checked && tx) {
          const keyword = tx.description.split(" — ")[0];
          await addRule(keyword, category);
        }
        showToast("Kategorie gespeichert");
      } catch (err) {
        showToast("Fehler: " + err.message);
        sel.disabled = false;
      }
    });
  });

  if (items.length === 0) return;

  const rowCbs = root.querySelectorAll(".row-cb");
  const selectAllCb = root.querySelector("#select-all-cb");
  const selectedCountEl = root.querySelector("#selected-count");
  const bulkAssignBtn = root.querySelector("#bulk-assign-btn");
  const bulkCatSelect = root.querySelector("#bulk-cat-select");

  function updateBulkState() {
    const checked = Array.from(rowCbs).filter((cb) => cb.checked);
    selectedCountEl.textContent = `${checked.length} ausgewählt`;
    bulkAssignBtn.disabled = checked.length === 0 || !bulkCatSelect.value;
  }

  selectAllCb.addEventListener("change", () => {
    rowCbs.forEach((cb) => (cb.checked = selectAllCb.checked));
    updateBulkState();
  });
  rowCbs.forEach((cb) => cb.addEventListener("change", updateBulkState));
  bulkCatSelect.addEventListener("change", updateBulkState);

  bulkAssignBtn.addEventListener("click", async () => {
    const ids = Array.from(rowCbs).filter((cb) => cb.checked).map((cb) => cb.dataset.id);
    const category = bulkCatSelect.value;
    if (ids.length === 0 || !category) return;
    bulkAssignBtn.disabled = true;
    try {
      await updateTransactionsCategoryBulk(ids, category);
      showToast(`${ids.length} Buchungen kategorisiert`);
    } catch (err) {
      showToast("Fehler: " + err.message);
      bulkAssignBtn.disabled = false;
    }
  });
}

function renderTxTable(root) {
  const wrap = root.querySelector("#tx-table-wrap");

  if (txFilters.month) items = items.filter((t) => t.date.startsWith(txFilters.month));

    items = items.filter((t) => t.description.toLowerCase().includes(q));

  items.sort((a, b) => (a.date < b.date ? 1 : -1));
  const total = items.reduce((s, t) => s + t.amount, 0);
  const catOptions = CATEGORIES.map((c) => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join("");

  wrap.innerHTML = `
    <p class="muted">${items.length} Buchung(en) — Summe: ${fmtEuro(total)}</p>
    ${isAdmin ? `
      <div class="toolbar">
        <label style="display:flex; align-items:center; gap:6px;"><input type="checkbox" id="tx-select-all-cb" /> Alle auswählen</label>
        <span id="tx-selected-count" class="muted">0 ausgewählt</span>
        <select id="tx-bulk-cat-select">
          <option value="">Kategorie für Auswahl...</option>
          ${catOptions}
        </select>
        <button class="btn btn-primary" id="tx-bulk-assign-btn" disabled>Zuweisen</button>
      </div>
    ` : ""}
    <div style="max-height:600px; overflow:auto;">
    <table>
      <thead><tr>${isAdmin ? "<th></th>" : ""}<th>Datum</th><th>Beschreibung</th><th class="amount">Betrag</th><th>Kategorie</th><th></th></tr></thead>
      <tbody>
        ${items.map((t) => `
          <tr data-id="${t.id}">
            ${isAdmin ? `<td><input type="checkbox" class="tx-row-cb" data-id="${t.id}" /></td>` : ""}
            <td>${t.date}</td>
            <td>${escapeHtml(t.description)}${rawDetailsHtml(t.raw)}</td>
            <td class="amount ${t.amount < 0 ? "negative" : "positive"}">${fmtEuro(t.amount)}</td>
            <td>${
              isAdmin
                ? `<select class="cat-select" data-id="${t.id}">${catOptions}</select>`
                : `<span class="badge">${escapeHtml(t.category)}</span>`
            }</td>
            <td>${isAdmin ? `<button class="btn btn-danger delete-btn" data-id="${t.id}">Löschen</button>` : ""}</td>
          </tr>`).join("")}
      </tbody>
    </table>
    </div>
    ${items.length === 0 ? '<div class="empty-state">Keine Buchungen gefunden.</div>' : ""}
  `;

  if (!isAdmin) return;

  wrap.querySelectorAll(".cat-select").forEach((sel) => {
    const id = sel.dataset.id;
    const tx = items.find((t) => t.id === id);
    sel.value = tx.category;
    sel.addEventListener("change", async () => {
      sel.disabled = true;
      try {
        await updateTransactionCategory(id, sel.value);
        showToast("Kategorie aktualisiert");
      } catch (err) {
        showToast("Fehler: " + err.message);
      } finally {
        sel.disabled = false;
      }
    });
  });

  wrap.querySelectorAll(".delete-btn").forEach((btn) => {
    btn.addEventListener("click", async () => {
      if (!confirm("Diese Buchung wirklich löschen?")) return;
      btn.disabled = true;
      try {
        await deleteTransaction(btn.dataset.id);
        showToast("Buchung gelöscht");
      } catch (err) {
        showToast("Fehler: " + err.message);
        btn.disabled = false;
      }
    });
  });

  if (items.length === 0) return;

  const rowCbs = wrap.querySelectorAll(".tx-row-cb");
  const selectAllCb = wrap.querySelector("#tx-select-all-cb");
  const selectedCountEl = wrap.querySelector("#tx-selected-count");
  const bulkAssignBtn = wrap.querySelector("#tx-bulk-assign-btn");
  const bulkCatSelect = wrap.querySelector("#tx-bulk-cat-select");

  function updateBulkState() {
    const checked = Array.from(rowCbs).filter((cb) => cb.checked);
    selectedCountEl.textContent = `${checked.length} ausgewählt`;
    bulkAssignBtn.disabled = checked.length === 0 || !bulkCatSelect.value;
  }

  selectAllCb.addEventListener("change", () => {
    rowCbs.forEach((cb) => (cb.checked = selectAllCb.checked));
    updateBulkState();
  });
  rowCbs.forEach((cb) => cb.addEventListener("change", updateBulkState));
  bulkCatSelect.addEventListener("change", updateBulkState);

  bulkAssignBtn.addEventListener("click", async () => {
    const ids = Array.from(rowCbs).filter((cb) => cb.checked).map((cb) => cb.dataset.id);
    const category = bulkCatSelect.value;
    if (ids.length === 0 || !category) return;
    bulkAssignBtn.disabled = true;
    try {
      await updateTransactionsCategoryBulk(ids, category);
      showToast(`${ids.length} Buchungen aktualisiert`);
    } catch (err) {
      showToast("Fehler: " + err.message);
      bulkAssignBtn.disabled = false;
    }
  });
}

/* ============================================================
   10) APP-SHELL: Login, Navigation, Live-Sync
   ============================================================ */
const loginScreen = document.getElementById("login-screen");
const appEl = document.getElementById("app");
const loginForm = document.getElementById("login-form");
const loginError = document.getElementById("login-error");
const userEmailEl = document.getElementById("user-email");
const viewRoot = document.getElementById("view-root");
const tabButtons = document.querySelectorAll(".tab-btn");

const views = { dashboard: renderDashboard, import: renderImport, categorize: renderCategorize, transactions: renderTransactions };
const ADMIN_ONLY_VIEWS = ["import", "categorize"];
let currentView = "dashboard";
let isAdmin = false;

function switchView(name) {
  if (!views[name]) return;
  if (!isAdmin && ADMIN_ONLY_VIEWS.includes(name)) return;
  currentView = name;
  tabButtons.forEach((btn) => btn.classList.toggle("active", btn.dataset.view === name));
  renderCurrentView();
}
function renderCurrentView() {
  viewRoot.innerHTML = "";
  views[currentView](viewRoot);
}
function applyRoleVisibility() {
  tabButtons.forEach((btn) => {
    btn.classList.toggle("hidden", !isAdmin && ADMIN_ONLY_VIEWS.includes(btn.dataset.view));
  });
}

tabButtons.forEach((btn) => btn.addEventListener("click", () => switchView(btn.dataset.view)));
document.getElementById("logout-btn").addEventListener("click", () => signOut(auth));

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  loginError.textContent = "";
  const email = document.getElementById("login-email").value.trim();
  const password = document.getElementById("login-password").value;
  const submitBtn = loginForm.querySelector('button[type="submit"]');
  submitBtn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (err) {
    loginError.textContent = "Anmeldung fehlgeschlagen. E-Mail/Passwort prüfen.";
  } finally {
    submitBtn.disabled = false;
  }
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    isAdmin = user.uid === ADMIN_UID;
    applyRoleVisibility();
    loginScreen.classList.add("hidden");
    appEl.classList.remove("hidden");
    userEmailEl.textContent = user.email + (isAdmin ? "" : " (nur Ansicht)");
    store.start();
    store.subscribe(() => { if (currentView !== "import") renderCurrentView(); });
    // Falls die zuletzt aktive Ansicht für diese Rolle gesperrt ist (z.B.
    // nach einem Logout/Login-Wechsel), auf die Übersicht zurückfallen.
    if (!isAdmin && ADMIN_ONLY_VIEWS.includes(currentView)) currentView = "dashboard";
    switchView(currentView);
  } else {
    store.stop();
    appEl.classList.add("hidden");
    loginScreen.classList.remove("hidden");
    loginForm.reset();
  }
});
</script>
